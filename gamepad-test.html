<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Gamepad診断</title>
<style>
/* AUDIOCHKと同系のダークテーマ。外部フォント依存なし（診断用に単体で完結） */
:root{--bg:#0a0a0f;--sf:#13131a;--bd:#2a2a3d;--ac:#00e5ff;--a2:#ff4081;--tx:#e8e8f0;--dm:#9a9ac0;--ok:#69ff47;--ng:#ff4d4d}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,'Hiragino Sans',sans-serif;
  height:100dvh;display:flex;flex-direction:column;max-width:640px;margin:0 auto;overflow:hidden}
header{padding:8px 12px;border-bottom:1px solid var(--bd);background:var(--sf);
  display:flex;align-items:center;gap:8px;flex-shrink:0}
.logo{font-family:ui-monospace,monospace;font-size:12px;color:var(--ac);letter-spacing:2px}
.ver{font-family:ui-monospace,monospace;font-size:10px;color:var(--ng)}
#status{padding:14px 12px;font-size:15px;line-height:1.5;border-bottom:1px solid var(--bd);flex-shrink:0}
#status .big{font-size:22px;font-weight:700}
.ok{color:var(--ok)} .ng{color:var(--ng)} .dim{color:var(--dm)}
#live{padding:12px;flex-shrink:0;border-bottom:1px solid var(--bd)}
#btnBig{font-family:ui-monospace,monospace;font-size:64px;font-weight:700;color:var(--ac);
  text-align:center;min-height:80px;line-height:80px}
#axesLine{font-family:ui-monospace,monospace;font-size:12px;color:var(--dm);text-align:center;margin-top:4px}
#padInfo{font-size:11px;color:var(--dm);text-align:center;margin-top:6px;word-break:break-all}
#log{flex:1;overflow-y:auto;padding:8px 12px;font-family:ui-monospace,monospace;font-size:11px;line-height:1.7;
  -webkit-overflow-scrolling:touch}
#log .t{color:var(--dm)}
#log .ev{color:var(--ac)}
footer{padding:10px 12px;border-top:1px solid var(--bd);background:var(--sf);flex-shrink:0;
  font-size:11px;color:var(--dm);line-height:1.6}
button.clr{float:right;background:none;border:1px solid rgba(0,229,255,.30);color:var(--ac);
  border-radius:6px;padding:4px 12px;font-size:11px}
</style>
</head>
<body>
<header><span class="logo">GAMEPAD診断</span><span class="ver">v1</span>
  <span style="flex:1"></span><button class="clr" id="clrBtn">ログ消去</button></header>

<div id="status">
  <div class="big dim" id="stMain">未接続</div>
  <div class="dim" id="stSub">コントローラーを接続し、<b>何かボタンを押してください</b>（iOSは押すまで検出されません）</div>
</div>

<div id="live">
  <div id="btnBig">--</div>
  <div id="axesLine"></div>
  <div id="padInfo"></div>
</div>

<div id="log"></div>

<footer>
  <b>試し方</b>：8BitDo microの側面モードスイッチを <b>S</b>（できなければ <b>D</b>）にして、iPhoneのBluetooth設定から再ペアリング → このページで何かボタンを押す。<br>
  「接続」と出てボタン番号が表示されれば <b>Gamepad API対応＝フォーカス不要方式へ移行可能</b>です。押したボタンと番号の対応をメモしてください（十字キーはボタン12-15または軸で出ます）。K（キーボード）モードではここには何も出ません（正常）。
</footer>

<script>
'use strict';
const $=id=>document.getElementById(id);
const logEl=$('log');
let lines=0;
function log(msg,isEv){
  const d=new Date(), t=('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2)+':'+('0'+d.getSeconds()).slice(-2);
  const div=document.createElement('div');
  div.innerHTML='<span class="t">'+t+'</span> '+(isEv?'<span class="ev">':'')+msg+(isEv?'</span>':'');
  logEl.appendChild(div);
  if(++lines>300){ logEl.removeChild(logEl.firstChild); lines--; }
  logEl.scrollTop=logEl.scrollHeight;
}
$('clrBtn').addEventListener('click',()=>{ logEl.innerHTML=''; lines=0; });

// ── 対応状況の表示 ──
if(!navigator.getGamepads){
  $('stMain').textContent='Gamepad API 非対応';
  $('stMain').className='big ng';
  $('stSub').textContent='このブラウザでは navigator.getGamepads が使えません';
  log('navigator.getGamepads が存在しません',true);
}else{
  log('Gamepad API あり。接続待ち…');
}

window.addEventListener('gamepadconnected',e=>{
  const g=e.gamepad;
  $('stMain').textContent='接続: '+g.id.slice(0,40);
  $('stMain').className='big ok';
  $('stSub').textContent='ボタンを押すと番号が大きく表示されます';
  log('接続 index='+g.index+' id="'+g.id+'" mapping="'+g.mapping+'" buttons='+g.buttons.length+' axes='+g.axes.length,true);
});
window.addEventListener('gamepaddisconnected',e=>{
  $('stMain').textContent='切断されました';
  $('stMain').className='big ng';
  log('切断 index='+e.gamepad.index,true);
});

// ── ポーリング（エッジ検出：押した瞬間/離した瞬間だけログ） ──
const prevBtns={}, prevAxes={};
function poll(){
  const pads=navigator.getGamepads?navigator.getGamepads():[];
  for(const g of pads){
    if(!g) continue;
    // buttons
    const pb=prevBtns[g.index]||(prevBtns[g.index]=[]);
    const pressed=[];
    g.buttons.forEach((b,i)=>{
      const on=b.pressed||b.value>0.5;
      if(on) pressed.push(i);
      if(on && !pb[i]) log('B'+i+' 押下'+(b.value!==1&&b.value!==0?(' val='+b.value.toFixed(2)):''));
      if(!on && pb[i]) log('B'+i+' 解放');
      pb[i]=on;
    });
    $('btnBig').textContent = pressed.length? pressed.map(i=>'B'+i).join(' ') : '--';
    // axes（0.5超えをデジタル扱いでエッジログ。十字キーが軸で来る機種向け）
    const pa=prevAxes[g.index]||(prevAxes[g.index]=[]);
    const ax=[];
    g.axes.forEach((v,i)=>{
      ax.push('A'+i+':'+v.toFixed(2));
      const dir=v>0.5?1:(v<-0.5?-1:0);
      if(dir!==0 && pa[i]!==dir) log('A'+i+(dir>0?' +':' −')+' ('+v.toFixed(2)+')');
      pa[i]=dir;
    });
    $('axesLine').textContent=ax.join('  ');
    $('padInfo').textContent='"'+g.id.slice(0,60)+'"  mapping='+(g.mapping||'(なし)')+'  visible時のみ更新';
  }
  requestAnimationFrame(poll);
}
requestAnimationFrame(poll);
</script>
</body>
</html>

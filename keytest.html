<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Key Test</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0f;color:#eee;font-family:monospace;padding:16px;font-size:13px}
h2{color:#00e5ff;margin-bottom:6px;font-size:14px}
p{color:#888;font-size:11px;margin-bottom:10px}
#display{background:#1a1a1a;border:2px solid #00e5ff;border-radius:8px;
  padding:16px;margin-bottom:8px;font-size:26px;text-align:center;color:#00e5ff;min-height:64px}
#state{font-size:10px;color:#6b6b88;text-align:center;margin-bottom:8px;min-height:16px}
#tapBtn{width:100%;padding:14px;background:#1c1c28;border:1px solid #2a2a3d;
  border-radius:6px;color:#eee;font-size:14px;cursor:pointer;margin-bottom:8px}
#log{background:#0d0d14;padding:10px;border-radius:6px;font-size:11px;
  line-height:1.8;max-height:280px;overflow-y:auto;white-space:pre-wrap}
</style>
</head>
<body>
<!-- hidden focus trap — same technique as main tool -->
<input id="ft" type="text" inputmode="none" readonly
  style="position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;border:none;
  outline:none;background:transparent;color:transparent;z-index:-1">

<h2>🎮 8BitDo Key Tester v2</h2>
<p>① タップ → ② コントローラーのボタンを押す</p>
<button id="tapBtn" onclick="grab()">▶ タップしてフォーカス取得</button>
<div id="state">待機中...</div>
<div id="display">—</div>
<div id="log"></div>

<script>
const ft=document.getElementById('ft');
const disp=document.getElementById('display');
const stEl=document.getElementById('state');
const logEl=document.getElementById('log');
let n=0;

function L(s){ n++; logEl.textContent=n+': '+s+'\n'+logEl.textContent; }

function grab(){
  ft.focus({preventScroll:true});
  stEl.textContent='フォーカス: ft (hidden input) ✓';
  stEl.style.color='#00e5ff';
  L('grab() called → ft focused');
}

document.addEventListener('pointerup', ()=>{ setTimeout(grab,50); });
document.addEventListener('touchend', ()=>{ setTimeout(grab,50); }, {passive:true});

ft.addEventListener('focusin',  ()=>{ stEl.textContent='フォーカスOK ✓'; stEl.style.color='#69ff47'; });
ft.addEventListener('focusout', ()=>{ stEl.textContent='フォーカス失った！'; stEl.style.color='#ff4081'; });

function onKey(e){
  e.preventDefault(); e.stopPropagation();
  const info='key='+JSON.stringify(e.key)+' code='+e.code+' kc='+e.keyCode+' shift='+e.shiftKey+' meta='+e.metaKey;
  disp.textContent=e.key+' ('+e.code+')';
  L(info);
}
ft.addEventListener('keydown', onKey);
// fallback
document.addEventListener('keydown', e=>{ if(e.target!==ft){ L('doc-fallback key='+JSON.stringify(e.key)); } });

setTimeout(grab, 300);
L('UA: '+navigator.userAgent.slice(0,70));
</script>
</body>
</html>

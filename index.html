<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AudioCheck</title>
<!-- PWA home screen icon -->
<link rel="apple-touch-icon" id="appIcon" href="">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Audio Check">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+JP:wght@300;400;700&display=swap');
:root{
  --bg:#0a0a0f;--sf:#13131a;--s2:#1c1c28;--bd:#2a2a3d;
  --ac:#00e5ff;--a2:#ff4081;--a3:#69ff47;--tx:#e8e8f0;--dm:#6b6b88;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--tx);font-family:'Noto Sans JP',sans-serif;font-weight:300;
  display:flex;flex-direction:column;height:100dvh;max-width:640px;margin:0 auto}

/* HEADER */
header{display:flex;align-items:center;gap:5px;padding:5px 8px;
  border-bottom:1px solid var(--bd);background:var(--sf);flex-shrink:0}
.logo{font-family:'Space Mono',monospace;font-size:11px;color:var(--ac);letter-spacing:2px;white-space:nowrap}
.fname{flex:1;font-size:10px;color:var(--dm);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.hbtn{background:var(--s2);border:1px solid var(--bd);border-radius:5px;font-size:13px;
  width:32px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.hbtn.wide{width:auto;padding:0 8px;font-size:10px;font-family:'Space Mono',monospace;color:var(--dm)}
.hbtn:active{opacity:.6}
#fileInput,#folderInput,#importData{display:none}

/* PLAYLIST */
#playlist{background:var(--s2);border-bottom:1px solid var(--bd);
  max-height:0;overflow:hidden;transition:max-height .2s;flex-shrink:0}
#playlist.open{max-height:110px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.pl-item{display:flex;align-items:center;gap:5px;padding:5px 8px;cursor:pointer;
  border-bottom:1px solid var(--bd);font-size:11px}
.pl-item.active{background:rgba(0,229,255,.08);border-left:3px solid var(--ac)}
.pl-num{font-family:'Space Mono',monospace;font-size:9px;color:var(--dm);min-width:16px}
.pl-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* WAVEFORM */
.wave-wrap{position:relative;background:var(--sf);border-bottom:1px solid var(--bd);
  flex-shrink:0;touch-action:none;user-select:none;-webkit-user-select:none}
#waveCanvas{display:block;width:100%;height:72px}

/* INFO */
.info{display:flex;align-items:center;gap:4px;padding:2px 8px;
  background:var(--s2);border-bottom:1px solid var(--bd);
  font-family:'Space Mono',monospace;font-size:10px;flex-shrink:0}
#timeDisp{color:var(--ac);font-size:11px}
#timeTotal{color:var(--dm)}
#silInfo{color:var(--a3);font-size:9px}
#zoomInfo{color:var(--dm);font-size:9px;margin-left:auto}

/* SEEK */
.seek-wrap{flex-shrink:0;background:var(--sf);border-bottom:1px solid var(--bd);
  touch-action:none;user-select:none;-webkit-user-select:none;overflow:hidden}
#seekCanvas{display:block;width:100%}

/* SPEED — collapsible */
.spd-section{flex-shrink:0;background:var(--sf);border-bottom:1px solid var(--bd)}
.spd-header{display:flex;align-items:center;padding:3px 8px;cursor:pointer;gap:6px}
.spd-header-label{font-family:'Space Mono',monospace;font-size:9px;color:var(--dm);letter-spacing:1px}
.spd-cur{font-family:'Space Mono',monospace;font-size:11px;color:var(--ac);font-weight:700}
.spd-arrow{font-size:9px;color:var(--dm);transition:transform .2s;margin-left:auto}
.spd-arrow.open{transform:rotate(180deg)}
.spd-body{max-height:0;overflow:hidden;transition:max-height .2s}
.spd-body.open{max-height:80px}
.spd-inner{padding:3px 8px 5px}
.spd-row{display:flex;gap:3px;align-items:center;overflow-x:auto;-webkit-overflow-scrolling:touch}
.spd-row::-webkit-scrollbar{display:none}
.spb{background:var(--s2);border:1px solid var(--bd);border-radius:4px;color:var(--dm);
  font-family:'Space Mono',monospace;font-size:10px;padding:4px 6px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.spb.on{background:var(--ac);color:#000;border-color:var(--ac);font-weight:700}
.spb.sc0{box-shadow:inset 0 0 0 2px rgba(255,64,129,.6)}
.spb.sc1{box-shadow:inset 0 0 0 2px rgba(105,255,71,.6)}
.spb.sc2{box-shadow:inset 0 0 0 2px rgba(255,200,0,.6)}
.spb:active{opacity:.7}
.spcust{display:flex;align-items:center;gap:2px;flex-shrink:0;margin-left:3px}
.spcust label{font-size:9px;color:var(--dm)}
#customSpeed{width:38px;background:var(--s2);border:1px solid var(--bd);border-radius:4px;
  color:var(--tx);font-family:'Space Mono',monospace;font-size:10px;padding:2px 3px;text-align:center}
/* SC row inside speed panel */
.sc-row{display:flex;align-items:center;gap:4px;margin-top:4px}
.sc-row label{font-family:'Space Mono',monospace;font-size:9px;color:var(--dm);white-space:nowrap}
.sc-btn{flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:4px;
  color:var(--tx);font-family:'Space Mono',monospace;font-size:10px;padding:4px;
  cursor:pointer;text-align:center;white-space:nowrap}
.sc-btn.sc0{border-color:rgba(255,64,129,.7);color:rgba(255,130,160,1)}
.sc-btn.sc1{border-color:rgba(105,255,71,.7);color:rgba(130,255,100,1)}
.sc-btn.sc2{border-color:rgba(255,200,0,.7);color:rgba(255,210,60,1)}
.sc-btn:active{opacity:.6}
.sc-set-btn{background:var(--s2);border:1px solid var(--bd);border-radius:4px;
  color:var(--dm);font-family:'Space Mono',monospace;font-size:9px;padding:4px 7px;
  cursor:pointer;white-space:nowrap;flex-shrink:0}
.sc-set-btn:active{opacity:.6}

/* CONTROLS */
.ctrl-wrap{flex-shrink:0;background:var(--sf);border-bottom:1px solid var(--bd);padding:5px 8px}
.crow{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:4px}
.crow:last-child{margin-bottom:0}
/* base circle button */
.tb{background:var(--s2);border:1px solid var(--bd);border-radius:50%;color:var(--tx);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-family:'Space Mono',monospace;flex-shrink:0}
.tb:active{opacity:.6;transform:scale(.93)}
/* sizes */
.tb.s28{width:28px;height:28px;font-size:9px}
.tb.s36{width:36px;height:36px;font-size:11px}
.tb.s44{width:44px;height:44px;font-size:14px}
.tb.s56{width:56px;height:56px;font-size:0;background:var(--ac);border-color:var(--ac);color:#000}
.tb.s56::after{content:'▶';font-size:22px;position:relative;left:2px}
.tb.s56.pause::after{content:'⏸';left:0}
/* head/tail: square rounded, bigger */
.tb.edge{border-radius:8px;width:44px;height:44px;font-size:18px;background:var(--s2)}
/* mark button */
.mkbtn{background:var(--a2);border:1px solid var(--a2);border-radius:8px;color:#fff;
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  cursor:pointer;width:72px;height:44px;flex-shrink:0}
.mkbtn:active{opacity:.6;transform:scale(.94)}
.mkbtn .mi{font-size:14px;line-height:1.2}
.mkbtn .ml{font-size:7px;color:rgba(255,255,255,.7);font-family:'Space Mono',monospace}
/* undo/redo */
.udbtn{background:var(--s2);border:1px solid var(--bd);border-radius:8px;color:var(--tx);
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  cursor:pointer;width:56px;height:44px;flex-shrink:0}
.udbtn:active{opacity:.6;transform:scale(.94)}
.udbtn .mi{font-size:14px;line-height:1.2}
.udbtn .ml{font-size:7px;color:var(--dm);font-family:'Space Mono',monospace}

/* SKIP */
.skip-row{display:flex;align-items:center;justify-content:center;gap:5px;
  padding:2px 8px 4px;background:var(--sf);border-bottom:1px solid var(--bd);flex-shrink:0}
.skip-row label{font-family:'Space Mono',monospace;font-size:9px;color:var(--dm)}
.skb{background:var(--s2);border:1px solid var(--bd);border-radius:4px;color:var(--tx);
  font-family:'Space Mono',monospace;font-size:14px;width:28px;height:26px;
  display:flex;align-items:center;justify-content:center;cursor:pointer}
.skb:active{opacity:.6}
#skipSec{width:36px;background:var(--s2);border:1px solid var(--bd);border-radius:4px;
  color:var(--tx);font-family:'Space Mono',monospace;font-size:10px;padding:2px;text-align:center}

/* MARKERS */
.mk-sec{flex:1;overflow-y:auto;background:var(--bg);-webkit-overflow-scrolling:touch;min-height:0}
.mk-hdr{display:flex;align-items:center;padding:4px 8px;font-family:'Space Mono',monospace;
  font-size:9px;color:var(--dm);letter-spacing:1px;border-bottom:1px solid var(--bd);
  position:sticky;top:0;background:var(--bg);z-index:10}
.mk-acts{display:flex;gap:3px;margin-left:auto}
.smbtn{background:var(--s2);border:1px solid var(--bd);border-radius:4px;color:var(--dm);
  font-size:9px;font-family:'Space Mono',monospace;padding:2px 5px;cursor:pointer;white-space:nowrap}
.smbtn:active{opacity:.6}
.smbtn.danger{border-color:var(--a2);color:var(--a2)}
.mk-item{display:flex;align-items:center;gap:5px;padding:7px 8px;
  border-bottom:1px solid var(--bd);cursor:pointer;transition:background .1s}
.mk-item.cur{background:rgba(0,229,255,.07)}
.mk-item.cur .m-time{color:var(--ac)}
.m-num{font-family:'Space Mono',monospace;font-size:9px;color:var(--a2);min-width:16px}
.m-time{font-family:'Space Mono',monospace;font-size:11px;color:var(--tx);white-space:nowrap}
.m-note{background:transparent;border:none;color:var(--dm);
  font-family:'Noto Sans JP',sans-serif;font-size:10px;outline:none;flex:1;min-width:0}
.m-del{color:var(--dm);font-size:12px;padding:2px 3px;cursor:pointer;border-radius:3px;flex-shrink:0}
.m-del:active{background:rgba(255,64,129,.2);color:var(--a2)}
.mk-empty{text-align:center;padding:18px;color:var(--dm);font-size:11px;line-height:2}

/* IO */
.io-bar{display:flex;gap:4px;padding:4px 8px;background:var(--sf);
  border-top:1px solid var(--bd);flex-shrink:0}
.iobtn{flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:5px;
  color:var(--dm);font-size:10px;font-family:'Space Mono',monospace;
  padding:4px;cursor:pointer;text-align:center}
.iobtn:active{opacity:.6}

#toast{position:fixed;bottom:48px;left:50%;transform:translateX(-50%) translateY(10px);
  background:var(--s2);border:1px solid var(--ac);color:var(--ac);
  font-family:'Space Mono',monospace;font-size:10px;padding:4px 12px;border-radius:20px;
  opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;z-index:200}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#lbar{position:fixed;top:0;left:0;height:2px;background:var(--ac);width:0%;transition:width .3s;z-index:300}
</style>
</head>
<body>
<div id="lbar"></div>
<header>
  <span class="logo">AUDIOCHK</span>
  <span class="fname" id="fileName">ファイルまたはフォルダを開いてください</span>
  <div style="display:flex;gap:3px;flex-shrink:0">
    <div class="hbtn" id="prevFileBtnH" title="前のファイル">⏮</div>
    <div class="hbtn" id="nextFileBtnH" title="次のファイル">⏭</div>
    <div class="hbtn" onclick="document.getElementById('folderInput').click()" title="フォルダ">📁</div>
    <div class="hbtn" onclick="document.getElementById('fileInput').click()" title="ファイル">🎵</div>
  </div>
  <input type="file" id="fileInput"
    accept=".mp3,.m4a,.aac,.wav,.ogg,.flac,.opus,.caf,audio/mpeg,audio/mp4,audio/x-m4a,audio/aac,audio/wav,audio/ogg,audio/flac,audio/opus">
  <input type="file" id="folderInput" webkitdirectory multiple>
  <input type="file" id="importData" accept=".json">
</header>
<audio id="audioEl" playsinline webkit-playsinline preload="auto" style="display:none"></audio>
<div id="playlist"></div>
<div class="wave-wrap" id="waveArea"><canvas id="waveCanvas"></canvas></div>
<div class="info">
  <span id="timeDisp">00:00:00.0</span>
  <span id="timeTotal">/ --:--:--</span>
  <span style="color:var(--bd);margin:0 2px">|</span>
  <span id="silInfo"></span>
  <span id="zoomInfo">×5.0</span>
</div>
<div class="seek-wrap" id="seekWrap"><canvas id="seekCanvas"></canvas></div>

<!-- SPEED (collapsible) -->
<div class="spd-section">
  <div class="spd-header" id="spdHeader">
    <span class="spd-header-label">SPEED</span>
    <span class="spd-cur" id="spdCur">×1.0</span>
    <span class="spd-arrow" id="spdArrow">▲</span>
  </div>
  <div class="spd-body" id="spdBody">
    <div class="spd-inner">
      <div class="spd-row" id="spdRow">
        <button class="spb" data-speed="0.5">×0.5</button>
        <button class="spb" data-speed="0.75">×0.75</button>
        <button class="spb on" data-speed="1.0">×1.0</button>
        <button class="spb" data-speed="1.25">×1.25</button>
        <button class="spb" data-speed="1.5">×1.5</button>
        <button class="spb" data-speed="2.0">×2.0</button>
        <div class="spcust"><label>×</label>
          <input type="number" id="customSpeed" value="1.0" min="0.1" max="4.0" step="0.05">
        </div>
      </div>
      <div class="sc-row">
        <label>SC:</label>
        <div class="sc-btn sc0" id="sc0">×0.5</div>
        <div class="sc-btn sc1" id="sc1">×1.0</div>
        <div class="sc-btn sc2" id="sc2">×1.5</div>
        <div class="sc-set-btn" id="scSetBtn">SET</div>
      </div>
    </div>
  </div>
</div>

<div class="ctrl-wrap">
  <!-- Row1: undo / mark / redo -->
  <div class="crow">
    <div class="udbtn" id="undoBtn"><span class="mi">↩</span><span class="ml">取消</span></div>
    <div class="mkbtn" id="markBtn"><span class="mi">🔖</span><span class="ml">マーク追加</span></div>
    <div class="udbtn" id="redoBtn"><span class="mi">↪</span><span class="ml">やり直し</span></div>
  </div>
  <!-- Row2: transport -->
  <div class="crow">
    <div class="tb edge" id="fileHeadBtn" title="先頭">⏮</div>
    <div class="tb s28" id="back01Btn" style="font-size:9px">-.1</div>
    <div class="tb s44" id="backNBtn">«<span id="backLbl">5</span></div>
    <div class="tb s56" id="playBtn"></div>
    <div class="tb s44" id="fwdNBtn"><span id="fwdLbl">5</span>»</div>
    <div class="tb s28" id="fwd01Btn" style="font-size:9px">.1+</div>
    <div class="tb edge" id="fileTailBtn" title="末尾">⏭</div>
  </div>
</div>

<div class="skip-row">
  <label>SKIP</label>
  <div class="skb" id="skMinus">−</div>
  <input type="number" id="skipSec" value="5" min="1" max="60">
  <label>秒</label>
  <div class="skb" id="skPlus">＋</div>
</div>

<div class="mk-sec">
  <div class="mk-hdr">
    MARKERS
    <div class="mk-acts">
      <button class="smbtn" id="prevMrkBtn">◀ prev</button>
      <button class="smbtn" id="nextMrkBtn">next ▶</button>
      <button class="smbtn danger" id="clearAllBtn">全削除</button>
    </div>
  </div>
  <div id="markerList"></div>
</div>
<div class="io-bar">
  <button class="iobtn" id="exportBtn">▼ EXPORT</button>
  <button class="iobtn" onclick="document.getElementById('importData').click()">▲ IMPORT</button>
  <button class="iobtn" onclick="togglePlaylist()">☰ LIST</button>
</div>
<div id="toast"></div>

<script>
'use strict';
// ═══ AUDIO ════════════════════════════════════
const audioEl=document.getElementById('audioEl');
function setPitch(e){e.preservesPitch=true;e.mozPreservesPitch=true;e.webkitPreservesPitch=true;}
setPitch(audioEl);

// ═══ STATE ════════════════════════════════════
let isPlaying=false, playbackRate=1.0, duration=0;
let objURL=null, curFileName='';
let markers=[], hist=[], redoSt=[];
let waveData=null, silReg=[];
let raf=null;
let playlist=[], plIdx=-1, skipSec=5;
let zoomLv=5.0, zoomCtr=0.1;
let curMkIdx=-1;
let scSpeeds=[0.5,1.0,1.5];
let scAssigning=-1; // which slot is being assigned (-1=none)
const LP=44,RH=22;
let ROWS=10;

audioEl.addEventListener('ended',()=>{isPlaying=false;updatePlayBtn();cancelAnimationFrame(raf);});
audioEl.addEventListener('error',()=>showToast('エラー code='+(audioEl.error?audioEl.error.code:'?')));

// ═══ LOCALSTORAGE ═════════════════════════════
const LS_PREFS='ac_prefs2';
const LS_FILE='ac_file2';

function savePrefs(){
  try{ localStorage.setItem(LS_PREFS,JSON.stringify({scSpeeds,skipSec,playbackRate})); }catch(e){}
}
function loadPrefs(){
  try{
    const p=JSON.parse(localStorage.getItem(LS_PREFS)||'{}');
    if(p.scSpeeds?.length===3) scSpeeds=p.scSpeeds;
    if(p.skipSec>0){ skipSec=p.skipSec; document.getElementById('skipSec').value=skipSec;
      document.getElementById('backLbl').textContent=skipSec;
      document.getElementById('fwdLbl').textContent=skipSec; }
    if(p.playbackRate>0) playbackRate=p.playbackRate;
  }catch(e){}
}
function lsKey(fname){ return 'ac_mk3_'+fname; }
function saveMk(fname,mkrs,silR,dur){
  try{ localStorage.setItem(lsKey(fname),JSON.stringify({markers:mkrs,silReg:silR,duration:dur,ts:Date.now()})); }catch(e){}
}
function loadMk(fname){
  try{
    const d=JSON.parse(localStorage.getItem(lsKey(fname))||'{}');
    return d.markers?d:null;
  }catch(e){return null;}
}
// save last opened folder/file list for restore
function saveLastSession(names, idx){
  try{ localStorage.setItem('ac_session',JSON.stringify({names,idx,ts:Date.now()})); }catch(e){}
}

// ═══ FILE INPUT ═══════════════════════════════
const AEXTS=/\.(mp3|m4a|aac|wav|ogg|flac|opus|webm|caf)$/i;
document.getElementById('fileInput').addEventListener('change',function(){
  const f=this.files[0];if(!f)return;
  playlist=[{name:f.name,file:f}];plIdx=0;
  setSrc(f);load(f);renderPL();this.value='';
});
document.getElementById('folderInput').addEventListener('change',function(){
  const files=Array.from(this.files)
    .filter(f=>AEXTS.test(f.name)||f.type.startsWith('audio/'))
    .sort((a,b)=>a.name.localeCompare(b.name,'ja'));
  if(!files.length){showToast('音声ファイルなし');return;}
  playlist=files.map(f=>({name:f.name,file:f}));plIdx=0;
  renderPL();document.getElementById('playlist').classList.add('open');
  setSrc(files[0]);load(files[0]);this.value='';
});

function setSrc(file){
  if(objURL)URL.revokeObjectURL(objURL);
  objURL=URL.createObjectURL(file);
  audioEl.src=objURL;audioEl.load();setPitch(audioEl);
}

// ═══ LOAD ═════════════════════════════════════
// Waveform decode constants
const WSAMP=1800;
const SIL_THRESH=0.015;   // amplitude below this = silence
const SIL_MIN_SEC=0.3;    // minimum silence duration
// Low sample rate for OfflineAudioContext — reduces memory dramatically
// 2000 Hz is enough for waveform/silence detection (not playback quality)
const WAVE_SAMPLE_RATE=2000;

async function load(file){
  showLd(true);
  curFileName=file.name;
  plIdx=playlist.findIndex(p=>p.file===file);
  isPlaying=false;updatePlayBtn();cancelAnimationFrame(raf);
  hist=[];redoSt=[];curMkIdx=-1;
  waveData=null;silReg=[];duration=0;
  document.getElementById('fileName').textContent=file.name;
  document.getElementById('timeTotal').textContent='/ --:--:--';
  drawWavePlaceholder();drawSeek(0);

  // Check LS for cached marker+silence data
  const cached=loadMk(file.name);
  if(cached){
    markers=cached.markers||[];
    silReg=cached.silReg||[];
    if(cached.duration>0) duration=cached.duration;
  } else {
    markers=[];
  }
  renderMarkers();

  // Get duration from audio element
  await new Promise(res=>{
    const done=()=>{
      if(isFinite(audioEl.duration)&&audioEl.duration>0) duration=audioEl.duration;
      res();
    };
    if(audioEl.readyState>=1&&isFinite(audioEl.duration)&&audioEl.duration>0){done();return;}
    audioEl.addEventListener('loadedmetadata',done,{once:true});
    audioEl.addEventListener('error',done,{once:true});
    setTimeout(done,5000);
  });
  if(duration>0) document.getElementById('timeTotal').textContent='/ '+fmtMs(duration);

  // Draw with cached silence even before waveform decode
  if(silReg.length>0){drawWave(0);drawSeek(0);}

  showLd(false);showToast(file.name);renderPL();

  // Decode waveform in background (non-blocking)
  buildWaveform(file).then(()=>{
    drawWave(audioEl.currentTime);
    drawSeek(audioEl.currentTime);
    // Save silence to LS after fresh decode
    saveMk(curFileName,markers,silReg,duration);
  }).catch(()=>{
    // Fallback flat wave
    waveData=new Float32Array(WSAMP).fill(0.2);
    drawWave(audioEl.currentTime);
  });

  // Save session
  saveLastSession(playlist.map(p=>p.name),plIdx);
}

// ── Waveform decode via OfflineAudioContext at low sample rate ──────
// Using 2000Hz sample rate: a 1-hour file uses only ~27MB RAM.
// This avoids the chunking approach where codec priming silence at
// chunk boundaries caused false silence detection everywhere.
async function buildWaveform(file){
  if(curFileName!==file.name) return;

  let ab;
  try{ ab=await file.arrayBuffer(); }
  catch(e){ throw new Error('arrayBuffer failed: '+e.message); }

  if(curFileName!==file.name) return; // file changed while reading

  // Step 1: decode at native sample rate to get PCM
  let nativeBuf=null;
  let actx=new(window.AudioContext||window.webkitAudioContext)();
  try{
    nativeBuf=await actx.decodeAudioData(ab);
  }finally{
    actx.close().catch(()=>{});
    actx=null;
    ab=null; // release compressed data immediately
  }
  if(!nativeBuf) throw new Error('decodeAudioData failed');
  if(curFileName!==file.name){ nativeBuf=null; return; }

  // Step 2: resample to WAVE_SAMPLE_RATE using OfflineAudioContext
  // This dramatically reduces the PCM buffer size in memory
  const nativeDur=nativeBuf.duration;
  const targetSamples=Math.ceil(nativeDur*WAVE_SAMPLE_RATE);
  let offCtx=new OfflineAudioContext(1, targetSamples, WAVE_SAMPLE_RATE);
  let src=offCtx.createBufferSource();
  src.buffer=nativeBuf;
  src.connect(offCtx.destination);
  src.start(0);
  nativeBuf=null; // release native PCM — offCtx has its own copy

  let rendered=null;
  try{ rendered=await offCtx.startRendering(); }
  finally{ offCtx=null; src=null; }
  if(!rendered) throw new Error('offline render failed');
  if(curFileName!==file.name){ rendered=null; return; }

  // Step 3: downsample rendered buffer to WSAMP points
  const ch=rendered.getChannelData(0);
  const step=Math.max(1,Math.floor(ch.length/WSAMP));
  waveData=new Float32Array(WSAMP);
  for(let i=0;i<WSAMP;i++){
    let mx=0; const b=i*step;
    for(let j=0;j<step&&b+j<ch.length;j++){
      const v=Math.abs(ch[b+j]); if(v>mx) mx=v;
    }
    waveData[i]=mx;
  }
  rendered=null; // release low-rate PCM

  extractSilence();
}

function extractSilence(){
  if(!waveData||!duration) return;
  silReg=[];
  const sps=duration/WSAMP;
  let ss=null;
  for(let i=0;i<=WSAMP;i++){
    const sil=i<WSAMP&&waveData[i]<SIL_THRESH;
    if(sil){if(ss===null)ss=i;}
    else if(ss!==null){
      const d=(i-ss)*sps;
      if(d>=SIL_MIN_SEC) silReg.push({start:ss*sps,end:i*sps,dur:d});
      ss=null;
    }
  }
}

// ═══ DRAW WAVEFORM ════════════════════════════
function drawWavePlaceholder(){
  const cv=document.getElementById('waveCanvas'),wa=document.getElementById('waveArea');
  const dpr=Math.min(window.devicePixelRatio||1,2),W=wa.clientWidth||320,H=72;
  cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+'px';cv.style.height=H+'px';
  const c=cv.getContext('2d');c.scale(dpr,dpr);
  c.fillStyle='#0d0d16';c.fillRect(0,0,W,H);
  c.fillStyle='#1e3a4a';c.fillRect(0,H/2-1,W,2);
}

function drawWave(ct){
  const cv=document.getElementById('waveCanvas'),wa=document.getElementById('waveArea');
  const dpr=Math.min(window.devicePixelRatio||1,2),W=wa.clientWidth||320,H=72;
  cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+'px';cv.style.height=H+'px';
  const c=cv.getContext('2d');c.scale(dpr,dpr);
  c.fillStyle='#0d0d16';c.fillRect(0,0,W,H);
  if(!duration){c.fillStyle='#1e3a4a';c.fillRect(0,H/2-1,W,2);return;}

  // clamp zoom window
  const hs=1/(2*zoomLv);
  let sf=zoomCtr-hs,ef=zoomCtr+hs;
  if(sf<0){ef-=sf;sf=0;}if(ef>1){sf-=ef-1;ef=1;}
  sf=Math.max(0,sf);ef=Math.min(1,ef);
  const startT=sf*duration,span=(ef-sf)*duration,mid=H/2;
  const ppx=((ct-startT)/span)*W;

  // silence regions
  for(const sr of silReg){
    if(sr.end<startT||sr.start>startT+span) continue;
    const sx=Math.max(0,((sr.start-startT)/span)*W);
    const ex=Math.min(W,((sr.end-startT)/span)*W);
    c.fillStyle='rgba(255,64,129,.16)';c.fillRect(sx,0,ex-sx,H);
    if(ex-sx>14){
      c.fillStyle='rgba(255,64,129,.75)';
      c.font="8px 'Space Mono',monospace";
      c.fillText(sr.dur.toFixed(1)+'s',Math.max(2,Math.min(W-28,(sx+ex)/2-8)),H-3);
    }
  }

  // waveform bars
  if(waveData){
    const si=Math.floor(sf*WSAMP),ei=Math.ceil(ef*WSAMP);
    const bw=Math.max(1,W/(ei-si));
    for(let i=si;i<ei;i++){
      const x=((i+.5)/WSAMP-sf)/(ef-sf)*W;
      const amp=waveData[i]*mid*.9;
      c.fillStyle=x<ppx?'#00b8d4':'#1e3a4a';
      c.fillRect(x-bw/2,mid-amp,bw,amp*2||1);
    }
  } else {
    c.fillStyle='#1e3a4a';c.fillRect(0,mid-2,W,4);
    if(ppx>0){c.fillStyle='#005f7a';c.fillRect(0,mid-2,Math.min(ppx,W),4);}
  }
  c.fillStyle='#2a2a3d';c.fillRect(0,mid-.5,W,1);

  // markers
  for(const m of markers){
    if(m.time<startT||m.time>startT+span) continue;
    const mx=((m.time-startT)/span)*W;
    c.strokeStyle='#ff4081';c.lineWidth=1.5;
    c.beginPath();c.moveTo(mx,0);c.lineTo(mx,H);c.stroke();
    c.fillStyle='#ff4081';
    c.beginPath();c.moveTo(mx-3,0);c.lineTo(mx+3,0);c.lineTo(mx,6);c.fill();
  }
  // playhead
  if(ct>=startT&&ct<=startT+span){
    const px=((ct-startT)/span)*W;
    c.strokeStyle='#00e5ff';c.lineWidth=2;
    c.beginPath();c.moveTo(px,0);c.lineTo(px,H);c.stroke();
  }
}

// ═══ DRAW SEEK ════════════════════════════════
function calcRows(){
  if(!duration) return 8;
  if(duration>5400) return 12;
  if(duration>3600) return 11;
  if(duration>1800) return 10;
  if(duration>600)  return 9;
  return 8;
}
function drawSeek(ct){
  ROWS=calcRows();
  const cv=document.getElementById('seekCanvas'),sw=document.getElementById('seekWrap');
  const dpr=Math.min(window.devicePixelRatio||1,2),W=sw.clientWidth||320;
  const TW=W-LP-4,TH=ROWS*RH;
  cv.width=W*dpr;cv.height=TH*dpr;cv.style.width=W+'px';cv.style.height=TH+'px';
  const c=cv.getContext('2d');c.scale(dpr,dpr);
  c.fillStyle='#0d0d16';c.fillRect(0,0,W,TH);
  if(!duration){
    c.fillStyle='#444466';c.font='10px sans-serif';c.textAlign='center';
    c.fillText('ファイルを開いてください',W/2,TH/2);c.textAlign='left';return;
  }
  const spr=duration/ROWS;
  for(let row=0;row<ROWS;row++){
    const rs=row*spr,re=(row+1)*spr,ry=row*RH,ly=ry+Math.floor(RH*.72);
    c.fillStyle='#44445a';c.font="9px 'Space Mono',monospace";c.textAlign='right';
    c.fillText(fmtShort(rs),LP-2,ly+3);c.textAlign='left';
    const pf=ct<=rs?0:ct>=re?1:(ct-rs)/spr;
    if(pf>0){c.fillStyle='#005f7a';c.fillRect(LP,ly-1,TW*pf,2);}
    c.fillStyle='#1a2e3a';c.fillRect(LP+TW*pf,ly-1,TW*(1-pf),2);
    for(const sr of silReg){
      if(sr.end<rs||sr.start>re) continue;
      const s=Math.max(rs,sr.start),e=Math.min(re,sr.end);
      c.fillStyle='rgba(255,64,129,.18)';
      c.fillRect(LP+((s-rs)/spr)*TW,ry+1,((e-s)/spr)*TW,RH-2);
    }
    for(const m of markers){
      if(m.time<rs||m.time>=re) continue;
      const mx=LP+((m.time-rs)/spr)*TW;
      c.fillStyle='#ff4081';
      c.beginPath();c.moveTo(mx-4,ly-8);c.lineTo(mx+4,ly-8);c.lineTo(mx,ly-1);c.closePath();c.fill();
    }
    if(ct>=rs&&ct<re){
      const px=LP+((ct-rs)/spr)*TW;
      c.fillStyle='#00e5ff';
      c.beginPath();c.arc(Math.max(LP+4,Math.min(LP+TW-4,px)),ly,4,0,Math.PI*2);c.fill();
    }
  }
  if(ct>=duration&&duration>0){
    const ly=(ROWS-1)*RH+Math.floor(RH*.72);
    c.fillStyle='#00e5ff';c.beginPath();c.arc(LP+TW,ly,4,0,Math.PI*2);c.fill();
  }
}

// seek canvas interaction
const seekCV=document.getElementById('seekCanvas');
let skDrag=false;
function seekFromXY(cx,cy){
  if(!duration||!objURL)return;
  const W=document.getElementById('seekWrap').clientWidth||320,TW=W-LP-4;
  const spr=duration/ROWS,row=Math.floor(cy/RH);
  if(row<0||row>=ROWS)return;
  const frac=Math.max(0,Math.min(1,(cx-LP)/TW));
  const t=Math.max(0,Math.min(duration,(row+frac)*spr));
  const hs=1/(2*zoomLv);
  zoomCtr=Math.max(hs,Math.min(1-hs,t/duration));
  seekTo(t);
}
function evXY(e){const r=seekCV.getBoundingClientRect(),s=e.touches?e.touches[0]:e;return{cx:s.clientX-r.left,cy:s.clientY-r.top};}
seekCV.addEventListener('click',e=>{const{cx,cy}=evXY(e);seekFromXY(cx,cy);});
seekCV.addEventListener('touchstart',e=>{skDrag=true;e.preventDefault();const{cx,cy}=evXY(e);seekFromXY(cx,cy);},{passive:false});
seekCV.addEventListener('touchmove',e=>{if(skDrag){e.preventDefault();const{cx,cy}=evXY(e);seekFromXY(cx,cy);}},{passive:false});
seekCV.addEventListener('touchend',()=>{skDrag=false;});

// ═══ WAVEFORM GESTURES ════════════════════════
const wa=document.getElementById('waveArea');
let pinch=false,lpd=0,t0x=0,t0c=0,swpMv=false;
wa.addEventListener('touchstart',e=>{
  if(e.touches.length===2){pinch=true;lpd=pd(e);e.preventDefault();}
  else{t0x=e.touches[0].clientX;t0c=zoomCtr;swpMv=false;}
},{passive:false});
wa.addEventListener('touchmove',e=>{
  if(e.touches.length===2&&pinch){
    e.preventDefault();
    const r=wa.getBoundingClientRect();
    doZoom(pd(e)/lpd,((e.touches[0].clientX+e.touches[1].clientX)/2-r.left)/r.width);lpd=pd(e);
  }else if(e.touches.length===1&&!pinch){
    e.preventDefault();swpMv=true;
    const dx=e.touches[0].clientX-t0x,r=wa.getBoundingClientRect();
    const hs=1/(2*zoomLv);
    zoomCtr=Math.max(hs,Math.min(1-hs,t0c+(-dx/r.width)/zoomLv));
    drawWave(audioEl.currentTime);
  }
},{passive:false});
wa.addEventListener('touchend',e=>{if(e.touches.length<2)setTimeout(()=>{pinch=false;},80);});
wa.addEventListener('click',e=>{
  if(!duration||pinch||swpMv)return;
  const r=wa.getBoundingClientRect(),ratio=(e.clientX-r.left)/r.width;
  const hs=1/(2*zoomLv);
  let sf=Math.max(0,zoomCtr-hs),ef=Math.min(1,zoomCtr+hs);
  if(sf<0){ef-=sf;sf=0;}if(ef>1){sf-=ef-1;ef=1;}
  seekTo((sf+ratio*(ef-sf))*duration);
});
wa.addEventListener('wheel',e=>{
  e.preventDefault();
  if(e.shiftKey){
    const hs=1/(2*zoomLv);zoomCtr=Math.max(hs,Math.min(1-hs,zoomCtr+(e.deltaY>0?.05:-.05)/zoomLv));
    drawWave(audioEl.currentTime);
  }else{const r=wa.getBoundingClientRect();doZoom(e.deltaY>0?.8:1.25,(e.clientX-r.left)/r.width);}
},{passive:false});
function pd(e){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;return Math.sqrt(dx*dx+dy*dy);}
function doZoom(scale,cr){
  const hs=1/(2*zoomLv);
  let sf=Math.max(0,zoomCtr-hs),ef=Math.min(1,zoomCtr+hs);
  if(sf<0){ef-=sf;sf=0;}if(ef>1){sf-=ef-1;ef=1;}
  const focal=sf+cr*(ef-sf),nz=Math.max(1,Math.min(200,zoomLv*scale)),nh=1/(2*nz);
  zoomCtr=Math.max(nh,Math.min(1-nh,focal));zoomLv=nz;
  document.getElementById('zoomInfo').textContent='×'+(nz>=10?nz.toFixed(0):nz.toFixed(1));
  drawWave(audioEl.currentTime);
}

// ═══ PLAYBACK ═════════════════════════════════
function curT(){return audioEl.currentTime||0;}
function play(){
  if(!objURL)return;
  audioEl.playbackRate=playbackRate;setPitch(audioEl);
  const p=audioEl.play();
  if(p)p.then(()=>{isPlaying=true;updatePlayBtn();loop();}).catch(e=>showToast('再生失敗:'+e.message));
  else{isPlaying=true;updatePlayBtn();loop();}
}
function stop(){
  audioEl.pause();isPlaying=false;updatePlayBtn();cancelAnimationFrame(raf);
  drawWave(curT());drawSeek(curT());updateTime(curT());
}
function seekTo(t){
  if(!objURL)return;
  const cl=Math.max(0,Math.min(duration||0,t));
  audioEl.currentTime=cl;
  if(!isPlaying){drawWave(cl);updateTime(cl);drawSeek(cl);}
  hlMk(cl);
}
function loop(){
  if(!isPlaying)return;
  const t=curT();
  drawWave(t);updateTime(t);drawSeek(t);
  chkSil(t);hlMk(t);
  if(zoomLv>1.5){
    const f=duration>0?t/duration:0,hs=1/(2*zoomLv);
    if(f<zoomCtr-hs*.4||f>zoomCtr+hs*.4) zoomCtr=Math.max(hs,Math.min(1-hs,f));
  }
  raf=requestAnimationFrame(loop);
}
function updatePlayBtn(){document.getElementById('playBtn').classList.toggle('pause',isPlaying);}
function updateTime(t){document.getElementById('timeDisp').textContent=fmtMs(t);}
function chkSil(t){
  const el=document.getElementById('silInfo');
  for(const sr of silReg){
    if(t>=sr.start&&t<=sr.end){el.textContent='■ '+sr.dur.toFixed(2)+'s';return;}
    if(t>sr.end&&t-sr.end<1.5){el.textContent='無音'+sr.dur.toFixed(1)+'s通過';return;}
  }
  el.textContent='';
}

function addMk(){
  if(!objURL)return;
  const t=curT();saveH();
  markers.push({time:t,note:''});markers.sort((a,b)=>a.time-b.time);
  renderMarkers();drawWave(t);drawSeek(t);hlMk(t);
  saveMk(curFileName,markers,silReg,duration);showToast('🔖 '+fmtMs(t));
}
function delMk(i){
  saveH();markers.splice(i,1);renderMarkers();drawWave(curT());drawSeek(curT());
  saveMk(curFileName,markers,silReg,duration);
}
function saveH(){hist.push(JSON.parse(JSON.stringify(markers)));redoSt=[];if(hist.length>60)hist.shift();}
function undo(){if(!hist.length)return;redoSt.push(JSON.parse(JSON.stringify(markers)));markers=hist.pop();renderMarkers();drawWave(curT());drawSeek(curT());saveMk(curFileName,markers,silReg,duration);showToast('取消');}
function redo(){if(!redoSt.length)return;hist.push(JSON.parse(JSON.stringify(markers)));markers=redoSt.pop();renderMarkers();drawWave(curT());drawSeek(curT());saveMk(curFileName,markers,silReg,duration);showToast('やり直し');}
function hlMk(t){
  let idx=-1;
  for(let i=markers.length-1;i>=0;i--){if(markers[i].time<=t+0.05){idx=i;break;}}
  if(idx===curMkIdx)return;curMkIdx=idx;
  document.querySelectorAll('.mk-item').forEach((el,i)=>el.classList.toggle('cur',i===idx));
  if(idx>=0){const el=document.getElementById('mi'+idx);if(el)el.scrollIntoView({block:'nearest',behavior:'smooth'});}
}
function renderMarkers(){
  const list=document.getElementById('markerList');
  if(!markers.length){list.innerHTML='<div class="mk-empty">マークなし<br><span style="font-size:9px;opacity:.5">🔖 または M キーで追加</span></div>';return;}
  list.innerHTML=markers.map((m,i)=>`
    <div class="mk-item" id="mi${i}" onclick="seekTo(${m.time})">
      <span class="m-num">#${i+1}</span>
      <span class="m-time">${fmtMs(m.time)}</span>
      <input class="m-note" value="${esc(m.note)}" placeholder="メモ..."
        onclick="event.stopPropagation()"
        onchange="markers[${i}].note=this.value;saveMk(curFileName,markers,silReg,duration)">
      <span class="m-del" onclick="event.stopPropagation();delMk(${i})">×</span>
    </div>`).join('');
}
document.getElementById('markBtn').addEventListener('click',addMk);
document.getElementById('undoBtn').addEventListener('click',undo);
document.getElementById('redoBtn').addEventListener('click',redo);
document.getElementById('clearAllBtn').addEventListener('click',()=>{
  if(!markers.length)return;
  if(confirm('全マーク削除?')){saveH();markers=[];renderMarkers();drawWave(curT());drawSeek(curT());saveMk(curFileName,markers,silReg,duration);}
});

// ═══ EXPORT / IMPORT ══════════════════════════
document.getElementById('exportBtn').addEventListener('click',()=>{
  if(playlist.length>1){
    const all=confirm('全ファイルをまとめてエクスポート?\nOK→全 / キャンセル→現在のみ');
    if(all){exportAll();return;}
  }
  exportCurrent();
});
function mkExportData(fname,mkrs,silR,dur){
  return{file:fname,duration:dur,markers:mkrs,
    silences:silR.map(s=>({start:+s.start.toFixed(3),end:+s.end.toFixed(3),dur:+s.dur.toFixed(3)}))};
}
function exportCurrent(){
  dlJSON(mkExportData(curFileName,markers,silReg,duration),
    (curFileName||'audio').replace(/\.[^.]+$/,'')+'_markers.json');showToast('エクスポート完了');
}
function exportAll(){
  const all=playlist.map(item=>{
    const d=loadMk(item.name);
    return mkExportData(item.name,d?.markers||[],d?.silReg||[],d?.duration||0);
  });
  dlJSON(all,'audiochk_all.json');showToast('全ファイルエクスポート完了');
}
function dlJSON(obj,fname){
  const blob=new Blob([JSON.stringify(obj,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=fname;a.click();URL.revokeObjectURL(url);
}
document.getElementById('importData').addEventListener('change',function(){
  const file=this.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      const entry=Array.isArray(d)?d.find(x=>x.file===curFileName)||d[0]:d;
      if(!Array.isArray(entry.markers))throw 0;
      saveH();markers=entry.markers;
      if(Array.isArray(entry.silences)) silReg=entry.silences.map(s=>({start:s.start,end:s.end,dur:s.dur}));
      renderMarkers();drawWave(curT());drawSeek(curT());
      saveMk(curFileName,markers,silReg,duration);showToast('インポート'+markers.length+'件');
    }catch{showToast('失敗');}
  };
  r.readAsText(file);this.value='';
});

// ═══ KEYBOARD ═════════════════════════════════
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  switch(e.key){
    case ' ':e.preventDefault();isPlaying?stop():play();break;
    case 'm':case 'M':addMk();break;
    case 'j':case 'J':seekTo(curT()-skipSec);break;
    case 'l':case 'L':seekTo(curT()+skipSec);break;
    case 'ArrowLeft':e.shiftKey?document.getElementById('prevMrkBtn').click():seekTo(curT()-10);break;
    case 'ArrowRight':e.shiftKey?document.getElementById('nextMrkBtn').click():seekTo(curT()+10);break;
    case 'z':case 'Z':if(e.ctrlKey||e.metaKey)undo();break;
    case 'y':case 'Y':if(e.ctrlKey||e.metaKey)redo();break;
    case '[':setSpd(Math.max(0.1,+(playbackRate-.1).toFixed(2)));break;
    case ']':setSpd(Math.min(4.0,+(playbackRate+.1).toFixed(2)));break;
    case '+':case '=':doZoom(1.25,.5);break;
    case '-':doZoom(.8,.5);break;
    case '1':setSpd(scSpeeds[0]);break;
    case '2':setSpd(scSpeeds[1]);break;
    case '3':setSpd(scSpeeds[2]);break;
    case 'n':case 'N':nextFile();break;
    case 'p':case 'P':prevFile();break;
  }
});

// ═══ HELPERS ══════════════════════════════════
function fmtMs(s){
  if(!isFinite(s)||s<0)return '--:--:--';
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=Math.floor(s%60),ms=Math.floor((s%1)*10);
  return `${p2(h)}:${p2(m)}:${p2(sc)}.${ms}`;
}
function fmtShort(s){
  if(!isFinite(s)||s<0)return '--:--';
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=Math.floor(s%60);
  return h>0?`${h}:${p2(m)}:${p2(sc)}`:`${p2(m)}:${p2(sc)}`;
}
function p2(n){return String(n).padStart(2,'0');}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;');}
let lT=null;
function showLd(on){
  const b=document.getElementById('lbar');b.style.width=on?'65%':'100%';
  clearTimeout(lT);if(!on)lT=setTimeout(()=>{b.style.width='0%';},350);
}
let tT=null;
function showToast(msg){
  const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
  clearTimeout(tT);tT=setTimeout(()=>el.classList.remove('show'),2000);
}
window.addEventListener('resize',()=>{drawWave(curT());drawSeek(curT());});

// ═══ INIT ═════════════════════════════════════
loadPrefs();
updateScBtns();
setSpd(playbackRate,true);
// Restore speed display without toast
function setSpd(s,silent){
  playbackRate=s;
  audioEl.playbackRate=s;setPitch(audioEl);
  document.querySelectorAll('.spb').forEach(b=>b.classList.toggle('on',parseFloat(b.dataset.speed)===s));
  document.getElementById('customSpeed').value=s;
  document.getElementById('spdCur').textContent='×'+(Number.isInteger(s)?s.toFixed(1):s);
  updateScHighlight();
  if(!silent) showToast('×'+s);
  savePrefs();
}
drawWavePlaceholder();drawSeek(0);renderMarkers();

// Generate PWA home screen icon dynamically as PNG
(function(){
  try{
    const cv=document.createElement('canvas');
    cv.width=180;cv.height=180;
    const c=cv.getContext('2d');
    // background
    c.fillStyle='#0a0a0f';
    c.roundRect?c.beginPath():null;
    if(c.roundRect){c.roundRect(0,0,180,180,32);c.fill();}
    else{c.fillRect(0,0,180,180);}
    // waveform bars (decorative)
    const bars=[0.3,0.6,0.9,0.7,1.0,0.8,0.5,0.4,0.7,0.9,0.6,0.3];
    bars.forEach((h,i)=>{
      const x=14+i*13,bh=h*50;
      c.fillStyle='#1e3a4a';
      c.fillRect(x,90-bh,9,bh*2);
    });
    // play button circle
    c.fillStyle='rgba(0,229,255,0.15)';
    c.beginPath();c.arc(90,90,52,0,Math.PI*2);c.fill();
    c.strokeStyle='#00e5ff';c.lineWidth=3;
    c.beginPath();c.arc(90,90,52,0,Math.PI*2);c.stroke();
    // play triangle
    c.fillStyle='#00e5ff';
    c.beginPath();c.moveTo(76,66);c.lineTo(76,114);c.lineTo(116,90);c.closePath();c.fill();
    // pink line at bottom
    c.fillStyle='#ff4081';
    c.fillRect(20,148,140,5);
    const url=cv.toDataURL('image/png');
    document.getElementById('appIcon').href=url;
  }catch(e){}
})();
</script>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AudioCheck</title>
<link rel="apple-touch-icon" id="appIcon" href="">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Audio Check">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+JP:wght@300;400;700&display=swap');
:root{--bg:#0a0a0f;--sf:#13131a;--s2:#1c1c28;--bd:#2a2a3d;--ac:#00e5ff;--a2:#ff4081;--a3:#69ff47;--tx:#e8e8f0;--dm:#6b6b88}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--tx);font-family:'Noto Sans JP',sans-serif;font-weight:300;
  display:flex;flex-direction:column;height:100dvh;max-width:640px;margin:0 auto}
header{display:flex;align-items:center;gap:5px;padding:5px 8px;
  border-bottom:1px solid var(--bd);background:var(--sf);flex-shrink:0}
.logo{font-family:'Space Mono',monospace;font-size:11px;color:var(--ac);letter-spacing:2px;white-space:nowrap}
.fname{flex:1;font-size:10px;color:var(--dm);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
#fileInput,#folderInput,#importData{display:none}
/* playlist */
#playlist{background:var(--s2);border-bottom:1px solid var(--bd);max-height:0;overflow:hidden;transition:max-height .2s;flex-shrink:0}
#playlist.open{max-height:110px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.pl-item{display:flex;align-items:center;gap:5px;padding:5px 8px;cursor:pointer;border-bottom:1px solid var(--bd);font-size:11px}
.pl-item.active{background:rgba(0,229,255,.08);border-left:3px solid var(--ac)}
.pl-num{font-family:'Space Mono',monospace;font-size:9px;color:var(--dm);min-width:16px}
.pl-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* waveform */
.wave-wrap{position:relative;background:var(--sf);border-bottom:1px solid var(--bd);
  flex-shrink:0;touch-action:none;user-select:none;-webkit-user-select:none}
#waveCanvas{display:block;width:100%;height:72px}
.wave-zoom-btns{position:absolute;left:4px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:3px;z-index:5}
.wzb{width:26px;height:26px;background:rgba(19,19,26,.88);border:1px solid var(--bd);border-radius:6px;
  color:var(--ac);font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;-webkit-user-select:none}
.wzb:active{background:rgba(0,229,255,.2)}
/* info */
.info{display:flex;align-items:center;gap:4px;padding:2px 8px;background:var(--s2);
  border-bottom:1px solid var(--bd);font-family:'Space Mono',monospace;font-size:10px;flex-shrink:0}
#timeDisp{color:var(--ac);font-size:11px}
#timeTotal{color:var(--dm)}
#silInfo{color:var(--a3);font-size:9px}
#zoomInfo{color:var(--dm);font-size:9px;margin-left:auto}
/* seek */
.seek-wrap{flex-shrink:0;background:var(--sf);border-bottom:1px solid var(--bd);
  touch-action:none;user-select:none;-webkit-user-select:none;overflow:hidden}
#seekCanvas{display:block;width:100%}
/* speed */
.spd-section{flex-shrink:0;background:var(--sf);border-bottom:1px solid var(--bd)}
.spd-header{display:flex;align-items:center;padding:3px 8px;cursor:pointer;gap:6px}
.spd-lbl{font-family:'Space Mono',monospace;font-size:9px;color:var(--dm);letter-spacing:1px}
.spd-cur{font-family:'Space Mono',monospace;font-size:11px;color:var(--ac);font-weight:700}
.spd-arrow{font-size:9px;color:var(--dm);transition:transform .2s;margin-left:auto}
.spd-arrow.open{transform:rotate(180deg)}
.spd-body{max-height:0;overflow:hidden;transition:max-height .2s}
.spd-body.open{max-height:90px}
.spd-inner{padding:3px 8px 5px}
.spd-row{display:flex;gap:3px;align-items:center;overflow-x:auto;-webkit-overflow-scrolling:touch}
.spd-row::-webkit-scrollbar{display:none}
.spb{background:var(--s2);border:1px solid var(--bd);border-radius:4px;color:var(--dm);
  font-family:'Space Mono',monospace;font-size:10px;padding:4px 6px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.spb.on{background:var(--ac);color:#000;border-color:var(--ac);font-weight:700}
.spb.sc0{box-shadow:inset 0 0 0 2px rgba(255,64,129,.6)}
.spb.sc1{box-shadow:inset 0 0 0 2px rgba(105,255,71,.6)}
.spb.sc2{box-shadow:inset 0 0 0 2px rgba(255,200,0,.6)}
.spb:active{opacity:.7}
.spcust{display:flex;align-items:center;gap:2px;flex-shrink:0;margin-left:3px}
.spcust label{font-size:9px;color:var(--dm)}
#customSpeed{width:38px;background:var(--s2);border:1px solid var(--bd);border-radius:4px;
  color:var(--tx);font-family:'Space Mono',monospace;font-size:10px;padding:2px 3px;text-align:center}
.sc-row{display:flex;align-items:center;gap:4px;margin-top:4px}
.sc-row label{font-family:'Space Mono',monospace;font-size:9px;color:var(--dm);white-space:nowrap}
.sc-btn{flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:4px;
  color:var(--tx);font-family:'Space Mono',monospace;font-size:10px;padding:4px;cursor:pointer;text-align:center;white-space:nowrap}
.sc-btn.sc0{border-color:rgba(255,64,129,.7);color:rgba(255,130,160,1)}
.sc-btn.sc1{border-color:rgba(105,255,71,.7);color:rgba(130,255,100,1)}
.sc-btn.sc2{border-color:rgba(255,200,0,.7);color:rgba(255,210,60,1)}
.sc-btn:active{opacity:.6}
.sc-set-btn{background:var(--s2);border:1px solid var(--bd);border-radius:4px;color:var(--dm);
  font-family:'Space Mono',monospace;font-size:9px;padding:4px 7px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.sc-set-btn:active{opacity:.6}
/* controls */
.ctrl-wrap{flex-shrink:0;background:var(--sf);border-bottom:1px solid var(--bd);padding:5px 8px}
.crow{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:4px}
.crow:last-child{margin-bottom:0}
canvas.cbtn{display:block;cursor:pointer;flex-shrink:0}
canvas.cbtn:active{opacity:.7;transform:scale(.93)}
/* skip */
.skip-row{display:flex;align-items:center;justify-content:center;gap:5px;
  padding:2px 8px 4px;background:var(--sf);border-bottom:1px solid var(--bd);flex-shrink:0}
.skip-row label{font-family:'Space Mono',monospace;font-size:9px;color:var(--dm)}
.skb{background:var(--s2);border:1px solid var(--bd);border-radius:4px;color:var(--tx);
  font-family:'Space Mono',monospace;font-size:14px;width:28px;height:26px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;-webkit-user-select:none}
.skb:active{opacity:.6}
#skipSec{width:36px;background:var(--s2);border:1px solid var(--bd);border-radius:4px;
  color:var(--tx);font-family:'Space Mono',monospace;font-size:10px;padding:2px;text-align:center}
/* markers */
.mk-sec{flex:1;overflow-y:auto;background:var(--bg);-webkit-overflow-scrolling:touch;min-height:0}
.mk-hdr{display:flex;align-items:center;padding:4px 8px;font-family:'Space Mono',monospace;
  font-size:9px;color:var(--dm);letter-spacing:1px;border-bottom:1px solid var(--bd);
  position:sticky;top:0;background:var(--bg);z-index:10}
.mk-acts{display:flex;gap:3px;margin-left:auto}
.smbtn{background:var(--s2);border:1px solid var(--bd);border-radius:4px;color:var(--dm);
  font-size:9px;font-family:'Space Mono',monospace;padding:2px 5px;cursor:pointer;white-space:nowrap}
.smbtn:active{opacity:.6}
.smbtn.danger{border-color:var(--a2);color:var(--a2)}
.mk-item{display:flex;align-items:center;gap:5px;padding:7px 8px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .1s}
.mk-item.cur{background:rgba(0,229,255,.07)}
.mk-item.cur .m-time{color:var(--ac)}
.m-num{font-family:'Space Mono',monospace;font-size:9px;color:var(--a2);min-width:16px}
.m-time{font-family:'Space Mono',monospace;font-size:11px;color:var(--tx);white-space:nowrap}
.m-note{background:transparent;border:none;color:var(--dm);font-family:'Noto Sans JP',sans-serif;font-size:10px;outline:none;flex:1;min-width:0}
.m-del{color:var(--dm);font-size:12px;padding:2px 3px;cursor:pointer;border-radius:3px;flex-shrink:0}
.m-del:active{background:rgba(255,64,129,.2);color:var(--a2)}
.mk-empty{text-align:center;padding:18px;color:var(--dm);font-size:11px;line-height:2}
/* io */
.io-bar{display:flex;gap:4px;padding:4px 8px;background:var(--sf);border-top:1px solid var(--bd);flex-shrink:0}
.iobtn{flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:5px;color:var(--dm);
  font-size:10px;font-family:'Space Mono',monospace;padding:4px;cursor:pointer;text-align:center}
.iobtn:active{opacity:.6}
#toast{position:fixed;bottom:48px;left:50%;transform:translateX(-50%) translateY(10px);
  background:var(--s2);border:1px solid var(--ac);color:var(--ac);font-family:'Space Mono',monospace;
  font-size:10px;padding:4px 12px;border-radius:20px;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;z-index:200}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#lbar{position:fixed;top:0;left:0;height:2px;background:var(--ac);width:0%;transition:width .3s;z-index:300}
</style>
</head>
<body>
<div id="lbar"></div>
<header>
  <span class="logo">AUDIOCHK</span>
  <span class="fname" id="fileName">ファイルまたはフォルダを開いてください</span>
  <div style="display:flex;gap:3px;flex-shrink:0">
    <canvas class="cbtn" id="folderBtn" width="32" height="28" data-w="32" data-h="28"></canvas>
    <canvas class="cbtn" id="fileBtn" width="32" height="28" data-w="32" data-h="28"></canvas>
  </div>
  <input type="file" id="fileInput" accept=".mp3,.m4a,.aac,.wav,.ogg,.flac,.opus,.caf,audio/mpeg,audio/mp4,audio/x-m4a,audio/aac,audio/wav,audio/ogg,audio/flac,audio/opus">
  <input type="file" id="folderInput" webkitdirectory multiple>
  <input type="file" id="importData" accept=".json">
</header>
<audio id="audioEl" playsinline webkit-playsinline preload="auto" style="display:none"></audio>
<div id="playlist"></div>
<div class="wave-wrap" id="waveArea">
  <canvas id="waveCanvas"></canvas>
  <div class="wave-zoom-btns">
    <div class="wzb" id="wzoomIn">+</div>
    <div class="wzb" id="wzoomOut">−</div>
  </div>
</div>
<div class="info">
  <span id="timeDisp">00:00:00.0</span>
  <span id="timeTotal">/ --:--:--</span>
  <span style="color:var(--bd);margin:0 2px">|</span>
  <span id="silInfo"></span>
  <span id="zoomInfo">×5.0</span>
</div>
<div class="seek-wrap" id="seekWrap"><canvas id="seekCanvas"></canvas></div>
<div class="spd-section">
  <div class="spd-header" id="spdHeader">
    <span class="spd-lbl">SPEED</span>
    <span class="spd-cur" id="spdCur">×1.0</span>
    <span class="spd-arrow" id="spdArrow">▲</span>
  </div>
  <div class="spd-body" id="spdBody">
    <div class="spd-inner">
      <div class="spd-row">
        <button class="spb" data-speed="0.5">×0.5</button>
        <button class="spb" data-speed="0.75">×0.75</button>
        <button class="spb on" data-speed="1.0">×1.0</button>
        <button class="spb" data-speed="1.25">×1.25</button>
        <button class="spb" data-speed="1.5">×1.5</button>
        <button class="spb" data-speed="2.0">×2.0</button>
        <div class="spcust"><label>×</label>
          <input type="number" id="customSpeed" value="1.0" min="0.1" max="4.0" step="0.05">
        </div>
      </div>
      <div class="sc-row">
        <label>SC:</label>
        <div class="sc-btn sc0" id="sc0">×0.5</div>
        <div class="sc-btn sc1" id="sc1">×1.0</div>
        <div class="sc-btn sc2" id="sc2">×1.5</div>
        <div class="sc-set-btn" id="scSetBtn">SET</div>
      </div>
    </div>
  </div>
</div>
<div class="ctrl-wrap">
  <div class="crow">
    <canvas class="cbtn" id="btnUndo" width="56" height="44" data-w="56" data-h="44"></canvas>
    <canvas class="cbtn" id="btnMark" width="80" height="44" data-w="80" data-h="44"></canvas>
    <canvas class="cbtn" id="btnRedo" width="56" height="44" data-w="56" data-h="44"></canvas>
  </div>
  <div class="crow">
    <canvas class="cbtn" id="btnHeadTail0" width="44" height="44" data-w="44" data-h="44"></canvas>
    <canvas class="cbtn" id="btnBack01" width="34" height="34" data-w="34" data-h="34"></canvas>
    <canvas class="cbtn" id="btnBackN" width="44" height="44" data-w="44" data-h="44"></canvas>
    <canvas class="cbtn" id="btnPlay" width="56" height="56" data-w="56" data-h="56"></canvas>
    <canvas class="cbtn" id="btnFwdN" width="44" height="44" data-w="44" data-h="44"></canvas>
    <canvas class="cbtn" id="btnFwd01" width="34" height="34" data-w="34" data-h="34"></canvas>
    <canvas class="cbtn" id="btnHeadTail1" width="44" height="44" data-w="44" data-h="44"></canvas>
  </div>
</div>
<div class="skip-row">
  <label>SKIP</label>
  <div class="skb" id="skMinus">−</div>
  <input type="number" id="skipSec" value="5" min="1" max="60">
  <label>秒</label>
  <div class="skb" id="skPlus">＋</div>
</div>
<div class="mk-sec">
  <div class="mk-hdr">MARKERS
    <div class="mk-acts">
      <button class="smbtn" id="prevMrkBtn">◀ prev</button>
      <button class="smbtn" id="nextMrkBtn">next ▶</button>
      <button class="smbtn danger" id="clearAllBtn">全削除</button>
    </div>
  </div>
  <div id="markerList"></div>
</div>
<div class="io-bar">
  <button class="iobtn" id="exportBtn">▼ EXPORT</button>
  <button class="iobtn" onclick="document.getElementById('importData').click()">▲ IMPORT</button>
  <button class="iobtn" onclick="togglePlaylist()">☰ LIST</button>
</div>
<div id="toast"></div>

<script>
'use strict';
// ── Audio ──────────────────────────────────────
const audioEl = document.getElementById('audioEl');
function setPitch(e){ e.preservesPitch=true; e.mozPreservesPitch=true; e.webkitPreservesPitch=true; }
setPitch(audioEl);

// ── State ──────────────────────────────────────
let isPlaying=false, playbackRate=1.0, duration=0;
let objURL=null, curFileName='';
let markers=[], hist=[], redoSt=[];
let waveData=null, silReg=[];
let raf=null;
let playlist=[], plIdx=-1, skipSec=5;
let zoomLv=5.0, zoomCtr=0.1;
let curMkIdx=-1;
let scSpeeds=[0.5,1.0,1.5];
let scAssigning=-1;
const LP=44, RH=22;
let ROWS=10;
const WSAMP=1800, SIL_THRESH=0.015, SIL_MIN=0.3;

audioEl.addEventListener('ended',()=>{ isPlaying=false; redrawPlayBtn(); cancelAnimationFrame(raf); });
audioEl.addEventListener('error',()=>showToast('エラー code='+(audioEl.error?audioEl.error.code:'?')));

// ── LocalStorage ───────────────────────────────
const LS_PREFS='ac_prefs3';
function savePrefs(){
  try{ localStorage.setItem(LS_PREFS,JSON.stringify({scSpeeds,skipSec,playbackRate})); }catch(e){}
}
function loadPrefs(){
  try{
    const p=JSON.parse(localStorage.getItem(LS_PREFS)||'{}');
    if(p.scSpeeds?.length===3) scSpeeds=p.scSpeeds;
    if(p.skipSec>0){ skipSec=p.skipSec; document.getElementById('skipSec').value=skipSec; updateSkipLabels(); }
    if(p.playbackRate>0) playbackRate=p.playbackRate;
  }catch(e){}
}
function lsKey(f){ return 'ac_mk4_'+f; }
function saveMk(){ try{ localStorage.setItem(lsKey(curFileName),JSON.stringify({markers,silReg,duration,ts:Date.now()})); }catch(e){} }
function loadMk(fname){ try{ const d=JSON.parse(localStorage.getItem(lsKey(fname))||'{}'); return d.markers?d:null; }catch(e){return null;} }

// ── File input ────────────────────────────────
const AEXTS=/\.(mp3|m4a|aac|wav|ogg|flac|opus|webm|caf)$/i;
document.getElementById('fileInput').addEventListener('change',function(){
  const f=this.files[0]; if(!f)return;
  playlist=[{name:f.name,file:f}]; plIdx=0;
  setSrc(f); load(f); renderPL(); this.value='';
});
document.getElementById('folderInput').addEventListener('change',function(){
  const files=Array.from(this.files).filter(f=>AEXTS.test(f.name)||f.type.startsWith('audio/')).sort((a,b)=>a.name.localeCompare(b.name,'ja'));
  if(!files.length){ showToast('音声ファイルなし'); return; }
  playlist=files.map(f=>({name:f.name,file:f})); plIdx=0;
  renderPL(); document.getElementById('playlist').classList.add('open');
  setSrc(files[0]); load(files[0]); this.value='';
});
function setSrc(file){
  if(objURL) URL.revokeObjectURL(objURL);
  objURL=URL.createObjectURL(file);
  audioEl.src=objURL; audioEl.load(); setPitch(audioEl);
}

// ── Load ──────────────────────────────────────
async function load(file){
  showLd(true);
  curFileName=file.name;
  plIdx=playlist.findIndex(p=>p.file===file);
  isPlaying=false; redrawPlayBtn(); cancelAnimationFrame(raf);
  hist=[]; redoSt=[]; curMkIdx=-1;
  waveData=null; silReg=[]; duration=0;
  document.getElementById('fileName').textContent=file.name;
  document.getElementById('timeTotal').textContent='/ --:--:--';
  drawWave(0); drawSeek(0);

  const cached=loadMk(file.name);
  if(cached){ markers=cached.markers||[]; silReg=cached.silReg||[]; duration=cached.duration||0; }
  else markers=[];
  renderMarkers();

  await new Promise(res=>{
    const done=()=>{ if(isFinite(audioEl.duration)&&audioEl.duration>0) duration=audioEl.duration; res(); };
    if(audioEl.readyState>=1&&isFinite(audioEl.duration)&&audioEl.duration>0){done();return;}
    audioEl.addEventListener('loadedmetadata',done,{once:true});
    audioEl.addEventListener('error',done,{once:true});
    setTimeout(done,5000);
  });
  if(duration>0) document.getElementById('timeTotal').textContent='/ '+fmtMs(duration);

  if(silReg.length>0){ drawWave(0); drawSeek(0); }
  showLd(false); showToast(file.name); renderPL();

  // decode waveform in background
  buildWaveform(file).then(()=>{ drawWave(audioEl.currentTime); drawSeek(audioEl.currentTime); saveMk(); }).catch(()=>{});
}

async function buildWaveform(file){
  if(curFileName!==file.name) return;

  // Limit decode size to prevent OOM on long files.
  // At 128kbps MP3: 1MB ≈ 62s, 10MB ≈ 620s (~10min)
  // We decode up to 10MB which covers ~10min; for longer files
  // the waveform covers only the first portion but silence detection still works.
  const MAX_DECODE = 10 * 1024 * 1024; // 10 MB
  const slice = file.size > MAX_DECODE ? file.slice(0, MAX_DECODE) : file;
  const decodedFraction = Math.min(1, slice.size / file.size);

  let ab;
  try { ab = await slice.arrayBuffer(); }
  catch(e) { return; }
  if(curFileName!==file.name) return;

  let actx=new(window.AudioContext||window.webkitAudioContext)();
  let buf=null;
  try{ buf=await actx.decodeAudioData(ab); }
  catch(e){ /* decode failed */ }
  finally{ actx.close().catch(()=>{}); actx=null; ab=null; }
  if(!buf||curFileName!==file.name) return;

  const ch=buf.getChannelData(0), total=ch.length;
  // Number of waveform points for decoded portion
  const decodedPts = Math.floor(WSAMP * decodedFraction);
  const step=Math.max(1,Math.floor(total/decodedPts));
  waveData=new Float32Array(WSAMP); // rest stays 0
  for(let i=0;i<decodedPts;i++){
    let mx=0,b=i*step;
    for(let j=0;j<step&&b+j<total;j++){ const v=Math.abs(ch[b+j]); if(v>mx)mx=v; }
    waveData[i]=mx;
  }
  buf=null;

  // Silence detection on decoded portion
  silReg=[];
  const decodedDur = buf===null ? (decodedFraction*duration) : buf?.duration || (decodedFraction*duration);
  const sps = (decodedFraction*duration) / decodedPts;
  let ss=null;
  for(let i=0;i<=decodedPts;i++){
    const sil=i<decodedPts&&waveData[i]<SIL_THRESH;
    if(sil){if(ss===null)ss=i;}
    else if(ss!==null){ const d=(i-ss)*sps; if(d>=SIL_MIN)silReg.push({start:ss*sps,end:i*sps,dur:d}); ss=null; }
  }
}

// ── Playlist ──────────────────────────────────
function renderPL(){
  document.getElementById('playlist').innerHTML=playlist.map((x,i)=>`
    <div class="pl-item ${i===plIdx?'active':''}" onclick="plTap(${i})">
      <span class="pl-num">${i+1}</span><span class="pl-name">${esc(x.name)}</span>
    </div>`).join('');
}
function plTap(i){ const f=playlist[i].file; plIdx=i; setSrc(f); load(f); }
function togglePlaylist(){ document.getElementById('playlist').classList.toggle('open'); }
function prevFile(){
  if(plIdx>0){ const f=playlist[--plIdx].file; setSrc(f); load(f); renderPL(); }
  else showToast('最初のファイル');
}
function nextFile(){
  if(plIdx<playlist.length-1){ const f=playlist[++plIdx].file; setSrc(f); load(f); renderPL(); }
  else showToast('最後のファイル');
}

// ── Draw waveform (block style) ───────────────
function getZoomWin(){
  const hs=1/(2*zoomLv);
  let sf=zoomCtr-hs, ef=zoomCtr+hs;
  if(sf<0){ef-=sf;sf=0;} if(ef>1){sf-=ef-1;ef=1;}
  return{sf:Math.max(0,sf),ef:Math.min(1,ef)};
}
function drawWave(ct){
  const cv=document.getElementById('waveCanvas'), wa=document.getElementById('waveArea');
  const dpr=Math.min(window.devicePixelRatio||1,2), W=wa.clientWidth||320, H=72;
  cv.width=W*dpr; cv.height=H*dpr; cv.style.width=W+'px'; cv.style.height=H+'px';
  const c=cv.getContext('2d'); c.scale(dpr,dpr);
  c.fillStyle='#0d0d16'; c.fillRect(0,0,W,H);
  if(!duration){ c.fillStyle='#1e3a4a'; c.fillRect(0,H/2-1,W,2); return; }

  const{sf,ef}=getZoomWin();
  const startT=sf*duration, span=(ef-sf)*duration, mid=H/2;
  const BLOCK=0.1, bVis=span/BLOCK, bPx=W/bVis;
  const firstB=Math.floor(startT/BLOCK), lastB=Math.ceil((startT+span)/BLOCK);
  const gap=bPx>4?1:0;

  for(let bi=firstB;bi<=lastB;bi++){
    const bs=bi*BLOCK, be=bs+BLOCK;
    const bx=((bs-startT)/span)*W, bw=Math.max(1,bPx-gap);
    if(bx+bw<0||bx>W) continue;
    let inSil=false;
    for(const sr of silReg){ if(bs<sr.end&&be>sr.start){inSil=true;break;} }
    const played=be<=ct, isCur=(ct>=bs&&ct<be);
    if(inSil){
      c.fillStyle=played?'rgba(255,64,129,.55)':'rgba(255,64,129,.22)';
      c.fillRect(bx,2,bw,H-4);
    } else if(waveData){
      const wi=Math.min(WSAMP-1,Math.floor((bs/duration)*WSAMP));
      const amp=Math.max(2,waveData[wi]*mid*.9);
      c.fillStyle=played?'#00b8d4':'#1e3a4a';
      c.fillRect(bx,mid-amp,bw,amp*2);
    } else {
      c.fillStyle=played?'#005f7a':'#162433';
      c.fillRect(bx,mid-H*.15,bw,H*.3);
    }
    if(isCur){ c.fillStyle='rgba(0,229,255,.15)'; c.fillRect(bx,0,bw,H); }
  }
  c.fillStyle='#2a2a3d'; c.fillRect(0,mid-.5,W,1);
  // silence labels when zoomed
  if(bPx>30){
    for(const sr of silReg){
      if(sr.end<startT||sr.start>startT+span) continue;
      const sx=Math.max(0,((sr.start-startT)/span)*W), ex=Math.min(W,((sr.end-startT)/span)*W);
      if(ex-sx>20){ c.fillStyle='rgba(255,64,129,.85)'; c.font="8px 'Space Mono',monospace";
        c.fillText(sr.dur.toFixed(1)+'s',Math.max(2,Math.min(W-28,(sx+ex)/2-8)),H-3); }
    }
  }
  // markers
  for(const m of markers){
    if(m.time<startT||m.time>startT+span) continue;
    const mx=((m.time-startT)/span)*W;
    c.strokeStyle='#ff4081'; c.lineWidth=1.5; c.beginPath(); c.moveTo(mx,0); c.lineTo(mx,H); c.stroke();
    c.fillStyle='#ff4081'; c.beginPath(); c.moveTo(mx-3,0); c.lineTo(mx+3,0); c.lineTo(mx,6); c.fill();
  }
  // playhead
  const ppx=((ct-startT)/span)*W;
  if(ppx>=0&&ppx<=W){ c.strokeStyle='#00e5ff'; c.lineWidth=2; c.beginPath(); c.moveTo(ppx,0); c.lineTo(ppx,H); c.stroke(); }
}

// ── Draw seek ────────────────────────────────
function calcRows(){ if(!duration)return 8; if(duration>5400)return 12; if(duration>3600)return 11; if(duration>1800)return 10; if(duration>600)return 9; return 8; }
function drawSeek(ct){
  ROWS=calcRows();
  const cv=document.getElementById('seekCanvas'), sw=document.getElementById('seekWrap');
  const dpr=Math.min(window.devicePixelRatio||1,2), W=sw.clientWidth||320, TW=W-LP-4, TH=ROWS*RH;
  cv.width=W*dpr; cv.height=TH*dpr; cv.style.width=W+'px'; cv.style.height=TH+'px';
  const c=cv.getContext('2d'); c.scale(dpr,dpr);
  c.fillStyle='#0d0d16'; c.fillRect(0,0,W,TH);
  if(!duration){ c.fillStyle='#444466'; c.font='10px sans-serif'; c.textAlign='center'; c.fillText('ファイルを開いてください',W/2,TH/2); c.textAlign='left'; return; }
  const spr=duration/ROWS;
  for(let row=0;row<ROWS;row++){
    const rs=row*spr, re=(row+1)*spr, ry=row*RH, ly=ry+Math.floor(RH*.72);
    c.fillStyle='#44445a'; c.font="9px 'Space Mono',monospace"; c.textAlign='right'; c.fillText(fmtShort(rs),LP-2,ly+3); c.textAlign='left';
    const pf=ct<=rs?0:ct>=re?1:(ct-rs)/spr;
    if(pf>0){c.fillStyle='#005f7a';c.fillRect(LP,ly-1,TW*pf,2);}
    c.fillStyle='#1a2e3a'; c.fillRect(LP+TW*pf,ly-1,TW*(1-pf),2);
    for(const sr of silReg){
      if(sr.end<rs||sr.start>re) continue;
      const s=Math.max(rs,sr.start),e=Math.min(re,sr.end);
      c.fillStyle='rgba(255,64,129,.2)'; c.fillRect(LP+((s-rs)/spr)*TW,ry+1,((e-s)/spr)*TW,RH-2);
    }
    for(const m of markers){
      if(m.time<rs||m.time>=re) continue;
      const mx=LP+((m.time-rs)/spr)*TW;
      c.fillStyle='#ff4081'; c.beginPath(); c.moveTo(mx-4,ly-8); c.lineTo(mx+4,ly-8); c.lineTo(mx,ly-1); c.closePath(); c.fill();
    }
    if(ct>=rs&&ct<re){ const px=LP+((ct-rs)/spr)*TW; c.fillStyle='#00e5ff'; c.beginPath(); c.arc(Math.max(LP+4,Math.min(LP+TW-4,px)),ly,4,0,Math.PI*2); c.fill(); }
  }
  if(ct>=duration&&duration>0){ const ly=(ROWS-1)*RH+Math.floor(RH*.72); c.fillStyle='#00e5ff'; c.beginPath(); c.arc(LP+TW,ly,4,0,Math.PI*2); c.fill(); }
}

// Seek canvas tap
const seekCV=document.getElementById('seekCanvas');
let skDrag=false;
function seekFromXY(cx,cy){
  if(!duration||!objURL)return;
  const W=document.getElementById('seekWrap').clientWidth||320, TW=W-LP-4;
  const spr=duration/ROWS, row=Math.floor(cy/RH);
  if(row<0||row>=ROWS)return;
  const t=Math.max(0,Math.min(duration,(row+Math.max(0,Math.min(1,(cx-LP)/TW)))*spr));
  const hs=1/(2*zoomLv); zoomCtr=Math.max(hs,Math.min(1-hs,t/duration));
  seekTo(t);
}
function evXY(e){ const r=seekCV.getBoundingClientRect(),s=e.touches?e.touches[0]:e; return{cx:s.clientX-r.left,cy:s.clientY-r.top}; }
seekCV.addEventListener('click',e=>{const{cx,cy}=evXY(e);seekFromXY(cx,cy);});
seekCV.addEventListener('touchstart',e=>{skDrag=true;e.preventDefault();const{cx,cy}=evXY(e);seekFromXY(cx,cy);},{passive:false});
seekCV.addEventListener('touchmove',e=>{if(skDrag){e.preventDefault();const{cx,cy}=evXY(e);seekFromXY(cx,cy);}},{passive:false});
seekCV.addEventListener('touchend',()=>{skDrag=false;});

// ── Waveform gestures ─────────────────────────
const wa=document.getElementById('waveArea');
let pinch=false,lpd=0,t0x=0,t0c=0,swpMv=false;
wa.addEventListener('touchstart',e=>{
  if(e.touches.length===2){pinch=true;lpd=pdist(e);e.preventDefault();}
  else{t0x=e.touches[0].clientX;t0c=zoomCtr;swpMv=false;}
},{passive:false});
wa.addEventListener('touchmove',e=>{
  if(e.touches.length===2&&pinch){ e.preventDefault(); const r=wa.getBoundingClientRect(); doZoom(pdist(e)/lpd,((e.touches[0].clientX+e.touches[1].clientX)/2-r.left)/r.width); lpd=pdist(e); }
  else if(e.touches.length===1&&!pinch){ e.preventDefault(); swpMv=true; const dx=e.touches[0].clientX-t0x,r=wa.getBoundingClientRect(),hs=1/(2*zoomLv); zoomCtr=Math.max(hs,Math.min(1-hs,t0c+(-dx/r.width)/zoomLv)); drawWave(audioEl.currentTime); }
},{passive:false});
wa.addEventListener('touchend',e=>{if(e.touches.length<2)setTimeout(()=>{pinch=false;},80);});
wa.addEventListener('click',e=>{
  if(!duration||pinch||swpMv)return;
  const r=wa.getBoundingClientRect(),ratio=(e.clientX-r.left)/r.width;
  const{sf,ef}=getZoomWin(); seekTo((sf+ratio*(ef-sf))*duration);
});
wa.addEventListener('wheel',e=>{
  e.preventDefault();
  if(e.shiftKey){const hs=1/(2*zoomLv);zoomCtr=Math.max(hs,Math.min(1-hs,zoomCtr+(e.deltaY>0?.05:-.05)/zoomLv));drawWave(audioEl.currentTime);}
  else{const r=wa.getBoundingClientRect();doZoom(e.deltaY>0?.8:1.25,(e.clientX-r.left)/r.width);}
},{passive:false});
function pdist(e){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;return Math.sqrt(dx*dx+dy*dy);}
function doZoom(scale,cr){
  const{sf,ef}=getZoomWin(), focal=sf+cr*(ef-sf);
  const nz=Math.max(1,Math.min(200,zoomLv*scale)), nh=1/(2*nz);
  zoomCtr=Math.max(nh,Math.min(1-nh,focal)); zoomLv=nz;
  document.getElementById('zoomInfo').textContent='×'+(nz>=10?nz.toFixed(0):nz.toFixed(1));
  drawWave(audioEl.currentTime);
}
document.getElementById('wzoomIn').addEventListener('click',()=>doZoom(1.4,.5));
document.getElementById('wzoomOut').addEventListener('click',()=>doZoom(1/1.4,.5));

// ── Playback ──────────────────────────────────
function curT(){return audioEl.currentTime||0;}
function play(){
  if(!objURL)return;
  audioEl.playbackRate=playbackRate; setPitch(audioEl);
  const p=audioEl.play();
  if(p)p.then(()=>{isPlaying=true;redrawPlayBtn();loop();}).catch(e=>showToast('再生失敗:'+e.message));
  else{isPlaying=true;redrawPlayBtn();loop();}
}
function stop(){
  audioEl.pause(); isPlaying=false; redrawPlayBtn(); cancelAnimationFrame(raf);
  drawWave(curT()); drawSeek(curT()); updateTime(curT());
}
function seekTo(t){
  if(!objURL)return;
  audioEl.currentTime=Math.max(0,Math.min(duration||0,t));
  if(!isPlaying){drawWave(audioEl.currentTime);updateTime(audioEl.currentTime);drawSeek(audioEl.currentTime);}
  hlMk(audioEl.currentTime);
}
function loop(){
  if(!isPlaying)return;
  const t=curT(); drawWave(t); updateTime(t); drawSeek(t); chkSil(t); hlMk(t);
  if(zoomLv>1.5){const f=duration>0?t/duration:0,hs=1/(2*zoomLv);if(f<zoomCtr-hs*.4||f>zoomCtr+hs*.4)zoomCtr=Math.max(hs,Math.min(1-hs,f));}
  raf=requestAnimationFrame(loop);
}
function redrawPlayBtn(){ drawBtn('btnPlay'); }
function updateTime(t){document.getElementById('timeDisp').textContent=fmtMs(t);}
function chkSil(t){
  const el=document.getElementById('silInfo');
  for(const sr of silReg){if(t>=sr.start&&t<=sr.end){el.textContent='■ '+sr.dur.toFixed(2)+'s';return;} if(t>sr.end&&t-sr.end<1.5){el.textContent='無音'+sr.dur.toFixed(1)+'s通過';return;}}
  el.textContent='';
}

document.getElementById('btnBackN').addEventListener('click',()=>seekTo(curT()-skipSec));

});

  document.getElementById('sc'+i).addEventListener('click',(()=>{const idx=i;return()=>{if(scAssigning>=0){showToast('速度ボタンを選んでください');return;}setSpd(scSpeeds[idx]);};})());

document.getElementById('scSetBtn').addEventListener('click',()=>{

function setSpd(s){
  playbackRate=s; audioEl.playbackRate=s; setPitch(audioEl);
  document.querySelectorAll('.spb').forEach(b=>b.classList.toggle('on',parseFloat(b.dataset.speed)===s));
  document.getElementById('customSpeed').value=s;
  const label='×'+(Number.isInteger(s)?s.toFixed(1):s);
  document.getElementById('spdCur').textContent=label;
  updateScHighlight(); showToast(label); savePrefs();
}
function updateScBtns(){
  for(let i=0;i<3;i++){ const s=scSpeeds[i]; document.getElementById('sc'+i).textContent='×'+(Number.isInteger(s)?s.toFixed(1):s); }
  updateScHighlight();
}
function updateScHighlight(){
  document.querySelectorAll('.spb').forEach(b=>{ b.classList.remove('sc0','sc1','sc2'); for(let i=0;i<3;i++) if(parseFloat(b.dataset.speed)===scSpeeds[i])b.classList.add('sc'+i); });
}

// ── Markers ───────────────────────────────────
function addMk(){
  if(!objURL)return; const t=curT(); saveH();
  markers.push({time:t,note:''}); markers.sort((a,b)=>a.time-b.time);
  renderMarkers(); drawWave(t); drawSeek(t); hlMk(t); saveMk(); showToast('🔖 '+fmtMs(t));
}
function delMk(i){ saveH(); markers.splice(i,1); renderMarkers(); drawWave(curT()); drawSeek(curT()); saveMk(); }
function saveH(){hist.push(JSON.parse(JSON.stringify(markers)));redoSt=[];if(hist.length>60)hist.shift();}
function undo(){if(!hist.length)return;redoSt.push(JSON.parse(JSON.stringify(markers)));markers=hist.pop();renderMarkers();drawWave(curT());drawSeek(curT());saveMk();showToast('取り消し');}
function redo(){if(!redoSt.length)return;hist.push(JSON.parse(JSON.stringify(markers)));markers=redoSt.pop();renderMarkers();drawWave(curT());drawSeek(curT());saveMk();showToast('やり直し');}
function hlMk(t){
  let idx=-1; for(let i=markers.length-1;i>=0;i--){if(markers[i].time<=t+0.05){idx=i;break;}}
  if(idx===curMkIdx)return; curMkIdx=idx;
  document.querySelectorAll('.mk-item').forEach((el,i)=>el.classList.toggle('cur',i===idx));
  if(idx>=0){const el=document.getElementById('mi'+idx);if(el)el.scrollIntoView({block:'nearest',behavior:'smooth'});}
}
function renderMarkers(){
  const list=document.getElementById('markerList');
  if(!markers.length){list.innerHTML='<div class="mk-empty">マークなし<br><span style="font-size:9px;opacity:.5">🔖 または M キーで追加</span></div>';return;}
  list.innerHTML=markers.map((m,i)=>`
    <div class="mk-item" id="mi${i}" onclick="seekTo(${m.time})">
      <span class="m-num">#${i+1}</span>
      <span class="m-time">${fmtMs(m.time)}</span>
      <input class="m-note" value="${esc(m.note)}" placeholder="メモ..." onclick="event.stopPropagation()" onchange="markers[${i}].note=this.value;saveMk()">
      <span class="m-del" onclick="event.stopPropagation();delMk(${i})">×</span>
    </div>`).join('');
}
document.getElementById('btnMark').addEventListener('click',addMk);
document.getElementById('btnUndo').addEventListener('click',undo);
document.getElementById('btnRedo').addEventListener('click',redo);
document.getElementById('clearAllBtn').addEventListener('click',()=>{
  if(!markers.length)return; if(confirm('全マーク削除?')){saveH();markers=[];renderMarkers();drawWave(curT());drawSeek(curT());saveMk();}
});

// ── Export / Import ───────────────────────────
document.getElementById('exportBtn').addEventListener('click',()=>{
  if(playlist.length>1){const all=confirm('全ファイルをまとめてエクスポート?\nOK→全 / キャンセル→現在のみ');if(all){exportAll();return;}}
  exportCurrent();
});
function mkExportObj(fname,mkrs,silR,dur){ return{file:fname,duration:dur,markers:mkrs,silences:silR.map(s=>({start:+s.start.toFixed(3),end:+s.end.toFixed(3),dur:+s.dur.toFixed(3)}))}; }
function exportCurrent(){ dlJSON(mkExportObj(curFileName,markers,silReg,duration),(curFileName||'audio').replace(/\.[^.]+$/,'')+'_markers.json'); showToast('エクスポート完了'); }
function exportAll(){ dlJSON(playlist.map(item=>{const d=loadMk(item.name);return mkExportObj(item.name,d?.markers||[],d?.silReg||[],d?.duration||0);}),'audiochk_all.json'); showToast('全エクスポート完了'); }
function dlJSON(obj,fname){ const b=new Blob([JSON.stringify(obj,null,2)],{type:'application/json'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download=fname;a.click();URL.revokeObjectURL(u); }
document.getElementById('importData').addEventListener('change',function(){
  const file=this.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{try{const d=JSON.parse(ev.target.result);const e=Array.isArray(d)?d.find(x=>x.file===curFileName)||d[0]:d;if(!Array.isArray(e.markers))throw 0;
    saveH();markers=e.markers;if(Array.isArray(e.silences))silReg=e.silences.map(s=>({start:s.start,end:s.end,dur:s.dur}));
    renderMarkers();drawWave(curT());drawSeek(curT());saveMk();showToast('インポート'+markers.length+'件');}catch{showToast('失敗');}};
  r.readAsText(file);this.value='';
});

// ── Keyboard ──────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  switch(e.key){
    case ' ':e.preventDefault();isPlaying?stop():play();break;
    case 'm':case 'M':addMk();break;
    case 'j':case 'J':seekTo(curT()-skipSec);break;
    case 'l':case 'L':seekTo(curT()+skipSec);break;
    case 'ArrowLeft':e.shiftKey?document.getElementById('prevMrkBtn').click():seekTo(curT()-10);break;
    case 'ArrowRight':e.shiftKey?document.getElementById('nextMrkBtn').click():seekTo(curT()+10);break;
    case 'z':case 'Z':if(e.ctrlKey||e.metaKey)undo();break;
    case 'y':case 'Y':if(e.ctrlKey||e.metaKey)redo();break;
    case '[':setSpd(Math.max(0.1,+(playbackRate-.1).toFixed(2)));break;
    case ']':setSpd(Math.min(4.0,+(playbackRate+.1).toFixed(2)));break;
    case '+':case '=':doZoom(1.25,.5);break;
    case '-':doZoom(.8,.5);break;
    case '1':setSpd(scSpeeds[0]);break;
    case '2':setSpd(scSpeeds[1]);break;
    case '3':setSpd(scSpeeds[2]);break;
    case 'n':case 'N':nextFile();break;
    case 'p':case 'P':prevFile();break;
  }
});

// ── Canvas Button Drawing ─────────────────────
const C={bg:'#1c1c28',bd:'#2a2a3d',ac:'#00e5ff',a2:'#ff4081',tx:'#e8e8f0',dm:'#6b6b88'};

function btnCanvas(id){
  const cv=document.getElementById(id); if(!cv)return null;
  const dpr=Math.min(window.devicePixelRatio||1,2);
  const W=parseInt(cv.getAttribute('width')), H=parseInt(cv.getAttribute('height'));
  cv.width=W*dpr; cv.height=H*dpr; cv.style.width=W+'px'; cv.style.height=H+'px';
  const c=cv.getContext('2d'); c.scale(dpr,dpr);
  c.clearRect(0,0,W,H); return{c,W,H};
}
function roundRect(c,x,y,w,h,r,fill,stroke){
  c.beginPath(); if(c.roundRect){c.roundRect(x,y,w,h,r);}else{c.rect(x,y,w,h);}
  if(fill){c.fillStyle=fill;c.fill();}
  if(stroke){c.strokeStyle=stroke;c.lineWidth=1.5;c.stroke();}
}
function circle(c,x,y,r,fill,stroke,sw){
  c.beginPath();c.arc(x,y,r,0,Math.PI*2);
  if(fill){c.fillStyle=fill;c.fill();}
  if(stroke){c.strokeStyle=stroke;c.lineWidth=sw||1.5;c.stroke();}
}

function drawBtn(id){
  const cv=document.getElementById(id); if(!cv)return;
  // Use data-w/data-h for logical size — never read cv.width which changes with dpr
  const W=parseInt(cv.dataset.w||cv.getAttribute('data-w')||'44');
  const H=parseInt(cv.dataset.h||cv.getAttribute('data-h')||'44');
  const dpr=Math.min(window.devicePixelRatio||1,2);
  cv.width=W*dpr; cv.height=H*dpr; cv.style.width=W+'px'; cv.style.height=H+'px';
  const c=cv.getContext('2d'); c.scale(dpr,dpr);
  c.clearRect(0,0,W,H);
  const cx=W/2, cy=H/2;

  if(id==='btnHeadTail0'){
    // ⏮ = |◀◀  bar on left, both triangles point LEFT (apex left)
    roundRect(c,0,0,W,H,6,C.bg,C.bd);
    c.fillStyle=C.ac;
    // vertical bar on left
    c.fillRect(cx-11,cy-7,2,14);
    // left triangle (apex at left)
    c.beginPath();c.moveTo(cx-8,cy);c.lineTo(cx,cy-7);c.lineTo(cx,cy+7);c.fill();
    // right triangle (apex at left)
    c.beginPath();c.moveTo(cx+1,cy);c.lineTo(cx+9,cy-7);c.lineTo(cx+9,cy+7);c.fill();
  } else if(id==='btnHeadTail1'){
    // ⏭ = ▶▶|  bar on right, both triangles point RIGHT (apex right)
    roundRect(c,0,0,W,H,6,C.bg,C.bd);
    c.fillStyle=C.ac;
    // vertical bar on right
    c.fillRect(cx+9,cy-7,2,14);
    // right triangle (apex at right)
    c.beginPath();c.moveTo(cx+8,cy);c.lineTo(cx,cy-7);c.lineTo(cx,cy+7);c.fill();
    // left triangle (apex at right)
    c.beginPath();c.moveTo(cx-1,cy);c.lineTo(cx-9,cy-7);c.lineTo(cx-9,cy+7);c.fill();
  } else if(id==='folderBtn'){
    roundRect(c,0,0,W,H,6,C.bg,C.bd);
    c.fillStyle=C.dm;
    const fx=cx-7,fy=cy-5,fw=14,fh=10;
    c.beginPath();c.moveTo(fx,fy+2);c.lineTo(fx+5,fy+2);c.lineTo(fx+6,fy);c.lineTo(fx+fw,fy);c.lineTo(fx+fw,fy+fh);c.lineTo(fx,fy+fh);c.closePath();c.fill();
  } else if(id==='fileBtn'){
    roundRect(c,0,0,W,H,6,C.bg,C.bd);
    c.fillStyle=C.dm;
    // music note
    circle(c,cx-2,cy+4,3,C.dm);
    c.fillRect(cx,cy-7,2,11); c.fillRect(cx,cy-7,6,2);
  } else if(id==='btnUndo'){
    roundRect(c,0,0,W,H,8,C.bg,C.bd);
    // curved arrow counter-clockwise
    c.strokeStyle=C.tx; c.lineWidth=2; c.lineCap='round';
    c.beginPath(); c.arc(cx+1,cy+2,7,Math.PI*.25,Math.PI*1.1); c.stroke();
    // arrowhead left
    c.fillStyle=C.tx;
    c.beginPath();c.moveTo(cx-6,cy-5);c.lineTo(cx-10,cy);c.lineTo(cx-3,cy+1);c.fill();
    c.fillStyle=C.dm; c.font="7px 'Space Mono',monospace"; c.textAlign='center';
    c.fillText('取り消し',cx,H-4); c.textAlign='left';
  } else if(id==='btnRedo'){
    roundRect(c,0,0,W,H,8,C.bg,C.bd);
    // curved arrow clockwise (mirror of undo)
    c.strokeStyle=C.tx; c.lineWidth=2; c.lineCap='round';
    c.beginPath(); c.arc(cx-1,cy+2,7,Math.PI*1.9,Math.PI*.9,true); c.stroke();
    // arrowhead right
    c.fillStyle=C.tx;
    c.beginPath();c.moveTo(cx+6,cy-5);c.lineTo(cx+10,cy);c.lineTo(cx+3,cy+1);c.fill();
    c.fillStyle=C.dm; c.font="7px 'Space Mono',monospace"; c.textAlign='center';
    c.fillText('やり直し',cx,H-4); c.textAlign='left';
  } else if(id==='btnMark'){
    roundRect(c,0,0,W,H,8,C.a2,'#ff80ab');
    // bookmark shape
    c.fillStyle='rgba(255,255,255,.92)';
    const bx=cx-7,by=cy-11,bw=14,bh=18;
    c.beginPath();c.moveTo(bx,by);c.lineTo(bx+bw,by);c.lineTo(bx+bw,by+bh);c.lineTo(cx,by+bh-5);c.lineTo(bx,by+bh);c.closePath();c.fill();
    c.fillStyle=C.a2; c.fillRect(cx-1,by+3,2,7); c.fillRect(bx+3,by+6,8,2);
    c.fillStyle='rgba(255,255,255,.75)'; c.font="7px 'Space Mono',monospace"; c.textAlign='center';
    c.fillText('マーク追加',cx,H-3); c.textAlign='left';
  } else if(id==='btnBack01'){
    roundRect(c,0,0,W,H,50,C.bg,C.bd);
    c.fillStyle=C.tx; c.font="bold 9px 'Space Mono',monospace"; c.textAlign='center';
    c.fillText('-.1',cx,cy+4); c.textAlign='left';
  } else if(id==='btnFwd01'){
    roundRect(c,0,0,W,H,50,C.bg,C.bd);
    c.fillStyle=C.tx; c.font="bold 9px 'Space Mono',monospace"; c.textAlign='center';
    c.fillText('+.1',cx,cy+4); c.textAlign='left';
  } else if(id==='btnBackN'){
    roundRect(c,0,0,W,H,50,C.bg,C.bd);
    c.strokeStyle=C.tx; c.lineWidth=2; c.lineCap='round'; c.lineJoin='round';
    // double chevron left
    c.beginPath();c.moveTo(cx,cy-6);c.lineTo(cx-5,cy);c.lineTo(cx,cy+6);c.stroke();
    c.beginPath();c.moveTo(cx+5,cy-6);c.lineTo(cx,cy);c.lineTo(cx+5,cy+6);c.stroke();
    c.fillStyle=C.ac; c.font="bold 8px 'Space Mono',monospace"; c.textAlign='center';
    c.fillText(String(skipSec),cx+8,cy+3); c.textAlign='left';
  } else if(id==='btnFwdN'){
    roundRect(c,0,0,W,H,50,C.bg,C.bd);
    c.strokeStyle=C.tx; c.lineWidth=2; c.lineCap='round'; c.lineJoin='round';
    c.beginPath();c.moveTo(cx,cy-6);c.lineTo(cx+5,cy);c.lineTo(cx,cy+6);c.stroke();
    c.beginPath();c.moveTo(cx-5,cy-6);c.lineTo(cx,cy);c.lineTo(cx-5,cy+6);c.stroke();
    c.fillStyle=C.ac; c.font="bold 8px 'Space Mono',monospace"; c.textAlign='center';
    c.fillText(String(skipSec),cx-8,cy+3); c.textAlign='left';
  } else if(id==='btnPlay'){
    circle(c,cx,cy,cx-1,C.ac);
    circle(c,cx,cy,cx-4,'rgba(255,255,255,.1)');
    c.fillStyle='#0a0a0f';
    if(isPlaying){
      c.fillRect(cx-8,cy-9,5,18); c.fillRect(cx+3,cy-9,5,18);
    } else {
      c.beginPath();c.moveTo(cx-5,cy-10);c.lineTo(cx-5,cy+10);c.lineTo(cx+12,cy);c.fill();
    }
  }
}

function drawAllBtns(){
  ['folderBtn','fileBtn',
   'btnUndo','btnMark','btnRedo',
   'btnHeadTail0','btnBack01','btnBackN','btnPlay','btnFwdN','btnFwd01','btnHeadTail1'].forEach(drawBtn);
}

// wire header canvas file buttons
document.getElementById('folderBtn').addEventListener('click',()=>document.getElementById('folderInput').click());
document.getElementById('fileBtn').addEventListener('click',()=>document.getElementById('fileInput').click());

// ── PWA Icon ──────────────────────────────────
(function(){
  try{
    const cv=document.createElement('canvas'); cv.width=180; cv.height=180;
    const c=cv.getContext('2d');
    c.fillStyle='#0a0a0f'; if(c.roundRect){c.beginPath();c.roundRect(0,0,180,180,32);c.fill();}else c.fillRect(0,0,180,180);
    const bars=[.3,.6,.9,.7,1,.8,.5,.4,.7,.9,.6,.3];
    bars.forEach((h,i)=>{c.fillStyle='#1e3a4a';c.fillRect(14+i*13,90-h*50,9,h*100);});
    c.fillStyle='rgba(0,229,255,.15)'; c.beginPath();c.arc(90,90,52,0,Math.PI*2);c.fill();
    c.strokeStyle='#00e5ff';c.lineWidth=3;c.beginPath();c.arc(90,90,52,0,Math.PI*2);c.stroke();
    c.fillStyle='#00e5ff';c.beginPath();c.moveTo(76,66);c.lineTo(76,114);c.lineTo(116,90);c.closePath();c.fill();
    c.fillStyle='#ff4081';c.fillRect(20,148,140,5);
    document.getElementById('appIcon').href=cv.toDataURL('image/png');
  }catch(e){}
})();

// ── Helpers ───────────────────────────────────
function fmtMs(s){if(!isFinite(s)||s<0)return'--:--:--';const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=Math.floor(s%60),ms=Math.floor((s%1)*10);return`${p2(h)}:${p2(m)}:${p2(sc)}.${ms}`;}
function fmtShort(s){if(!isFinite(s)||s<0)return'--:--';const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=Math.floor(s%60);return h>0?`${h}:${p2(m)}:${p2(sc)}`:`${p2(m)}:${p2(sc)}`;}
function p2(n){return String(n).padStart(2,'0');}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;');}
let lT=null;
function showLd(on){const b=document.getElementById('lbar');b.style.width=on?'65%':'100%';clearTimeout(lT);if(!on)lT=setTimeout(()=>{b.style.width='0%';},350);}
let tT=null;
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(tT);tT=setTimeout(()=>el.classList.remove('show'),2000);}
window.addEventListener('resize',()=>{drawWave(curT());drawSeek(curT());drawAllBtns();});

// ── Init ──────────────────────────────────────
loadPrefs();
updateScBtns();
// apply loaded speed silently
audioEl.playbackRate=playbackRate; setPitch(audioEl);
document.querySelectorAll('.spb').forEach(b=>b.classList.toggle('on',parseFloat(b.dataset.speed)===playbackRate));
document.getElementById('customSpeed').value=playbackRate;
document.getElementById('spdCur').textContent='×'+(Number.isInteger(playbackRate)?playbackRate.toFixed(1):playbackRate);
drawAllBtns();
drawWave(0); drawSeek(0); renderMarkers();
</script>
